adapters:

  - adapter_id: aisraf-orchestrator
    display_name: AISRAF Orchestrator
    adapter_file: .agents/aisraf-orchestrator.agent.md
    wraps_pras:
      - PRA-01-SAS-REVIEW-ORCHESTRATOR
    user_invocable: true
    tools_allowed: [read, search, edit]
    handoffs:
      - AISRAF Input Reader
      - AISRAF Handoff QA Scorer
    notes: >
      Single orchestrator adapter. Replaces the old v0.01 split between
      aisraf-orchestrator and aisraf-review-orchestrator.

  - adapter_id: aisraf-input-reader
    display_name: AISRAF Input Reader
    adapter_file: .agents/aisraf-input-reader.agent.md
    wraps_pras:
      - PRA-02-INPUT-READER
    user_invocable: true
    tools_allowed: [read, search, edit]
    handoffs:
      - AISRAF DFD Extractor

  - adapter_id: aisraf-dfd-extractor
    display_name: AISRAF DFD Extractor
    adapter_file: .agents/aisraf-dfd-extractor.agent.md
    wraps_pras:
      - PRA-03-DFD-EXTRACTOR
      - PRA-04-LEGEND-NORMALIZER
    user_invocable: true
    tools_allowed: [read, search, edit]
    handoffs:
      - AISRAF Review Table Builder
    notes: >
      Founder decision Q1: this adapter jointly wraps PRA-03 and PRA-04. There
      is no separate aisraf-legend-normalizer adapter in v0.1.2.

  - adapter_id: aisraf-review-table-builder
    display_name: AISRAF Review Table Builder
    adapter_file: .agents/aisraf-review-table-builder.agent.md
    wraps_pras:
      - PRA-05-REVIEW-TABLE-BUILDER
    user_invocable: true
    tools_allowed: [read, search, edit]
    handoffs:
      - AISRAF Blueprint Questioner
    notes: >
      Replaces the old v0.01 split between aisraf-boundary-stack-reviewer and
      aisraf-review-table-builder. PRA-05 owns boundary, stack, and table
      outputs together.

  - adapter_id: aisraf-blueprint-questioner
    display_name: AISRAF Blueprint Questioner
    adapter_file: .agents/aisraf-blueprint-questioner.agent.md
    wraps_pras:
      - PRA-06-BLUEPRINT-QUESTIONER
    user_invocable: true
    tools_allowed: [read, search, edit]
    handoffs:
      - AISRAF Finding Recommender

  - adapter_id: aisraf-finding-recommender
