schema_version: aisraf_prototype_agent_registry.v0_1_2
registry_id: prototype-agent-registry
title: AISRAF SAS Prototype Agent Registry
package_version: v0.1.2
owning_build_package: "06"
status: active
pra_count: 8
adapter_count: 7
prompt_count_mapped: 23
skill_count_mapped: 26

purpose: >
  Index the 8 canonical Prototype Review Agent (PRA) specifications and the 7
  local VS Code/GitHub Copilot adapter wrappers for AISRAF SAS Prototype
  v0.1.2. Each PRA spec groups Build Package 04 prompts and Build Package 05
  skills into a role-oriented review responsibility. Each adapter is a thin
  wrapper that points to one or more PRA specs and to the canonical prompt and
  skill artefacts they own. PRAs are specifications, not deployed runtime
  agents. Adapters are local Copilot dropdown entries, not deployed runtime
  agents. The registry resolves the future_pra_owner placeholder strings used
  by the Build Package 04 prompt registry and the Build Package 05 skill
  registry without editing those frozen registries.

scope:
  canonical_pra_root: prototype-agents
  canonical_adapter_root: .agents
  pra_specs_are_runtime_agents: false
  adapters_are_runtime_agents: false
  adapters_duplicate_full_prompt_or_skill_bodies: false
  adapters_claim_external_postback: false
  adapters_claim_runtime_or_cloud_execution: false
  adapters_claim_release_or_diagram_export: false

parameter_contract:
  run_profile_source: runs/{{run_id}}/run-profile.yaml
  required_run_profile_fields:
    - "{{run_id}}"
    - "{{input_root}}"
    - "{{expected_root}}"
    - "{{output_root}}"
    - "{{mode}}"
    - "{{postback_execution_status}}"
    - "{{output_destination_mode}}"
  rejected_non_schema_variables:
    - "{{catalog_root}}"
    - "{{prompt_root}}"
    - "{{skill_root}}"
    - "{{template_root}}"
    - "{{diagram_root}}"
    - "{{validation_root}}"
  output_root_rule: every_pra_and_adapter_write_path_must_resolve_under_output_root
  schema_authority: config/run-profile.schema.yaml
  field_catalog: config/run-profile.field-catalog.md
  validation_rules: config/run-profile.validation-rules.md
  path_resolution_rules: config/path-resolution-rules.md
  sensitive_data_rules: config/sensitive-data-rules.md
  canonical_artefact_paths_are_literal: true
  canonical_artefact_path_examples:
    - prompts/rs/01-input-package-read.prompt.md
    - skills/rs/SK-INPUT-PACKAGE-READ.md
    - prototype-agents/PRA-02-INPUT-READER.md

required_pra_sections:
  - "1. Identity"
  - "2. Purpose"
  - "3. Owned Prompts"
  - "4. Owned Skills"
  - "5. Inputs"
  - "6. Outputs"
  - "7. Procedure"
  - "8. Human Gates"
  - "9. Stop Conditions"
  - "10. Unknown Handling"
  - "11. Evidence and Run-Log Guidance"
  - "12. Direct Adapter Test"
  - "13. Not in Scope"

required_adapter_sections:
  - "1. Adapter Identity"
  - "2. Display Name"
  - "3. Purpose"
  - "4. Canonical PRA Reference"
  - "5. Prompt References"
  - "6. Skill References"
  - "7. Run-Profile Variables Required"
  - "8. Allowed Writes"
  - "9. Prohibited Writes"
  - "10. Operator Test Prompt"
  - "11. Stop Conditions"
  - "12. Not in Scope"

forbidden_claims:
  - runtime_or_cloud_execution
  - google_adk_execution
  - vertex_or_gcp_execution
  - mcp_execution
  - jira_postback_execution
  - confluence_publication_execution
  - rovo_execution
  - database_execution
  - terraform_or_iac_execution
  - release_or_zip_export
  - diagram_generation_from_a_pra_or_adapter
  - scoring_proof_outside_sk_accuracy_score
  - hardcoded_run_id_paths_or_urls
  - prompt_card_modification
  - skill_contract_modification
  - prompt_or_skill_registry_modification
  - baseline_modification_under_expected_root
  - duplication_of_full_prompt_or_skill_body_inside_an_adapter

placeholder_resolution_notes:
  notes: >
    The Build Package 04 prompt registry and the Build Package 05 skill
    registry both record future_pra_owner strings such as "PRA-INTAKE", "PRA-
    DFD-READER", "PRA-DESIGN-FACT-EXTRACTOR", "PRA-REVIEW-TABLE-BUILDER",
    "PRA-MISSING-FACT-INTERVIEWER", "PRA-AI-CLASSIFIER", "PRA-BLUEPRINT-
    MATCHER", "PRA-RISK-WRITER", "PRA-HANDOFF-BUILDER", "PRA-VALIDATION-NOTE-
    WRITER", "PRA-VALIDATION-SCORER", "PRA-DFD-EXTRACTOR", and "PRA-RS-
    REVIEW", each suffixed "(planned; defined in Build Package 06)". Build
    Package 06 does not edit those registries (founder decision Q2). The
    concrete PRA mapping below is authoritative.
  placeholder_to_pra_map:
    PRA-RS-REVIEW: PRA-01-SAS-REVIEW-ORCHESTRATOR
    PRA-INTAKE: PRA-02-INPUT-READER
    PRA-DFD-READER: PRA-03-DFD-EXTRACTOR + PRA-04-LEGEND-NORMALIZER
    PRA-DESIGN-FACT-EXTRACTOR_components_and_flows: PRA-03-DFD-EXTRACTOR
    PRA-DESIGN-FACT-EXTRACTOR_boundary_and_stack: PRA-05-REVIEW-TABLE-BUILDER
    PRA-REVIEW-TABLE-BUILDER: PRA-05-REVIEW-TABLE-BUILDER
    PRA-MISSING-FACT-INTERVIEWER: PRA-06-BLUEPRINT-QUESTIONER
    PRA-AI-CLASSIFIER: PRA-06-BLUEPRINT-QUESTIONER
    PRA-BLUEPRINT-MATCHER: PRA-06-BLUEPRINT-QUESTIONER
    PRA-RISK-WRITER: PRA-07-FINDING-RECOMMENDER
    PRA-HANDOFF-BUILDER: PRA-08-HANDOFF-QA-SCORER
    PRA-VALIDATION-NOTE-WRITER: PRA-08-HANDOFF-QA-SCORER
    PRA-VALIDATION-SCORER: PRA-08-HANDOFF-QA-SCORER
    PRA-DFD-EXTRACTOR: PRA-03-DFD-EXTRACTOR

