$schema: "https://json-schema.org/draft/2020-12/schema"
$id: aisraf-sas-run-profile.v0_1_2
title: AISRAF SAS Run Profile
description: >
  Canonical contract for runs/<run_id>/run-profile.yaml. Build Package 02
  declares this schema once. Build Packages 03 through 16 must resolve every
  {{variable}} reference against fields declared here. No later Build Package
  may invent run-profile fields outside this file (see
  validation/no-drift-rules.md).

  Field-by-field documentation lives in config/run-profile.field-catalog.md.
  Path resolution rules live in config/path-resolution-rules.md.
  Optional integration fields are documented in config/integration-fields.md.
  Sensitive-data prohibitions live in config/sensitive-data-rules.md.
  Validation checks live in config/run-profile.validation-rules.md.

type: object
additionalProperties: false

required:
  - schema_version
  - package_version
  - run_id
  - sample_id
  - mode
  - workspace_root
  - input_root
  - expected_root
  - output_root
  - old_reference_workspace
  - source_ticket_url
  - destination_ticket_url
  - destination_confluence_url
  - output_destination_mode
  - postback_execution_status
  - jira_connector_status
  - confluence_connector_status
  - rovo_mcp_available
  - mcp_execution_status
  - operator_name
  - reviewer_name
  - sensitive_data_confirmed_redacted
  - expected_baseline_required
  - scoring_enabled
  - created_at

properties:

  schema_version:
    type: string
    const: run_profile.v0_1_2
    description: Pins the run-profile schema. Operators must not edit.

  package_version:
    type: string
    const: v0.1.2
    description: Pins the package version. Operators must not edit.

  run_id:
    type: string
    pattern: "^RUN-[A-Z0-9][A-Z0-9-]*$"
    minLength: 5
    maxLength: 64
    description: Unique run identifier. Must equal the folder name under runs/.
    examples:
      - RUN-001
      - RUN-LOCAL-20260506
      - RUN-25D-20260505

  sample_id:
    type: string
    pattern: "^sample-[0-9]{3}[a-z0-9-]*$"
    minLength: 11
    maxLength: 64
    description: Sample folder name under samples/.
    examples:
      - sample-001-dfd-crop

  mode:
    type: string
    description: >
      Operator run mode. All v0.1.2 modes execute locally through folder
      inputs and output_root writes. Integration modes only add source or
      destination metadata or human-executed post-back evidence.
    enum:
      - folder_first_test
      - folder_first_review
      - integration_assisted_intake
      - integration_assisted_postback
      - dry_run_revalidation
      - live_reviewer_run
    default: folder_first_test

  workspace_root:
    type: string
    description: Active workspace root. Operators leave as ".".
    default: "."

  input_root:
    type: string
    description: Package-relative folder where staged inputs live for this run.
    pattern: "^(?!.*\\.\\.)(?![A-Za-z]:)(?!/).+"
    examples:
      - runs/RUN-001/inputs
      - samples/sample-001-dfd-crop/inputs

  expected_root:
    type: string
    description: >
      Package-relative folder containing expected baselines for scored runs.
      May be empty for exploratory or live_reviewer_run modes when
      expected_baseline_required is false.
    pattern: "^(?!.*\\.\\.)(?![A-Za-z]:)(?!/).*$"
    examples:
      - samples/sample-001-dfd-crop/expected
      - ""

  output_root:
    type: string
    description: >
      Package-relative folder where every run output must land. Must point
      under runs/<run_id>/. Writes outside this path are forbidden by
      Build Package 11 (runs and execution evidence model).
    pattern: "^runs/RUN-[A-Z0-9][A-Z0-9-]*(/.*)?$"
    examples:
      - runs/RUN-001
      - runs/RUN-LOCAL-20260506

  old_reference_workspace:
    type: string
    description: >
      Read-only acknowledgement of the v0.01 reference workspace. Operators
      must not write to this path. Tools (Build Package 03) populate this
      value; honest constant for traceability.
    examples:
      - "D:/E-Way 2/aisraf-sas-prototype-skill-chain-pack-v0.01"

  source_ticket_url:
    type: string
    description: >
      Optional Jira source ticket URL for the design-review intake. Empty in
      folder-first modes. URL only — no tokens, query credentials, or session
      identifiers.
    pattern: "^(|https://[^?#\\s]+)$"
    default: ""

  destination_ticket_url:
    type: string
    description: >
      Optional Jira destination ticket URL. Required when output_destination_mode
      is jira_draft, jira_and_confluence_draft, or external_postback_executed
      with a Jira destination. URL only.
    pattern: "^(|https://[^?#\\s]+)$"
    default: ""

  destination_confluence_url:
    type: string
    description: >
      Optional Confluence destination page URL. Required when
      output_destination_mode is confluence_draft, jira_and_confluence_draft,
      or external_postback_executed with a Confluence destination. URL only.
    pattern: "^(|https://[^?#\\s]+)$"
    default: ""

  output_destination_mode:
    type: string
    description: >
      Where outputs are intended to land. Declares INTENT only. Whether
      post-back actually happened is governed by postback_execution_status.
    enum:
      - local_only
      - jira_draft
      - confluence_draft
      - jira_and_confluence_draft
      - external_postback_executed
    default: local_only

  postback_execution_status:
    type: string
    description: >
      Human execution state for any external write. Stays deferred unless a
      human operator has actually posted or published and recorded evidence
      in output_root/00-run-log.md.
    enum:
      - deferred
      - formatted_only
      - executed_by_operator
      - not_attempted
    default: deferred

  jira_connector_status:
    type: string
    description: Whether a Jira connector is needed, configured, or executed for this run.
    enum:
      - not_required
      - unavailable
      - configured_not_tested
      - available
      - executed_by_operator
    default: not_required

  confluence_connector_status:
    type: string
    description: Whether a Confluence connector is needed, configured, or executed for this run.
    enum:
      - not_required
      - unavailable
      - configured_not_tested
      - available
      - executed_by_operator
    default: not_required

  rovo_mcp_available:
    type: boolean
    description: True only when Atlassian Rovo MCP is actually available to the operator.
    default: false

  mcp_execution_status:
    type: string
    description: MCP execution posture. Only executed_by_operator when a human ran an MCP-assisted action.
    enum:
      - not_required
      - unavailable
      - configured_not_tested
      - executed_by_operator
    default: not_required

  operator_name:
    type: string
    description: Operator display name or role label (no PII or credentials).
    minLength: 1
    maxLength: 80
    examples:
      - SAS reviewer
      - Local operator

  reviewer_name:
    type: string
    description: Reviewer display name or role label for the human acceptance gate (no PII or credentials).
    minLength: 1
    maxLength: 80
    examples:
      - SAS reviewer
      - AppSec reviewer

  sensitive_data_confirmed_redacted:
    type: boolean
    description: >
      Operator must set true before any run begins. Affirms that no
      credentials, tokens, real PII, PAN, SSN, customer secrets, production
      endpoints, or unredacted Class 5 payloads are present in inputs,
      destination URLs, notes, or other run-profile fields. See
      config/sensitive-data-rules.md.

  expected_baseline_required:
    type: boolean
    description: >
      True for scored runs against samples 001 through 099. False for
      exploratory runs and live_reviewer_run modes that do not score against
      a sample baseline. When true, expected_root must be non-empty.

  scoring_enabled:
    type: boolean
    description: >
      True when accuracy scoring will compare run outputs against
      expected_root baselines. Implies expected_baseline_required is true.

  created_at:
    type: string
    description: ISO 8601 UTC timestamp written by the run-setup tool (Build Package 03).
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
    examples:
      - "2026-05-06T12:00:00Z"

  notes:
    type: string
    description: >
      Free operator notes. Sensitive-data prohibition applies — see
      config/sensitive-data-rules.md.
    default: ""
    maxLength: 4096

allOf:

  # Folder-first conditional: pins all integration surface to safe defaults.
  - if:
      properties:
        mode:
          const: folder_first_test
      required: [mode]
    then:
      properties:
        output_destination_mode:
          const: local_only
        postback_execution_status:
          const: deferred
        source_ticket_url:
          const: ""
        destination_ticket_url:
          const: ""
        destination_confluence_url:
          const: ""
        jira_connector_status:
          enum: [not_required, unavailable]
        confluence_connector_status:
          enum: [not_required, unavailable]
        rovo_mcp_available:
          const: false
        mcp_execution_status:
          enum: [not_required, unavailable]

  # Folder-first review carries the same gating as folder_first_test.
  - if:
      properties:
        mode:
          const: folder_first_review
      required: [mode]
    then:
      properties:
        output_destination_mode:
          const: local_only
        postback_execution_status:
          const: deferred
        source_ticket_url:
          const: ""
        destination_ticket_url:
          const: ""
        destination_confluence_url:
          const: ""
        jira_connector_status:
          enum: [not_required, unavailable]
        confluence_connector_status:
          enum: [not_required, unavailable]
        rovo_mcp_available:
          const: false
        mcp_execution_status:
          enum: [not_required, unavailable]

  # Dry-run revalidation: same safe gating as folder-first.
  - if:
      properties:
        mode:
          const: dry_run_revalidation
      required: [mode]
    then:
      properties:
        output_destination_mode:
          const: local_only
        postback_execution_status:
          const: deferred
        jira_connector_status:
          enum: [not_required, unavailable]
        confluence_connector_status:
          enum: [not_required, unavailable]
        mcp_execution_status:
          enum: [not_required, unavailable]

  # jira_draft requires destination_ticket_url to be non-empty.
  - if:
      properties:
        output_destination_mode:
          const: jira_draft
      required: [output_destination_mode]
    then:
      properties:
        destination_ticket_url:
          minLength: 1

  # confluence_draft requires destination_confluence_url to be non-empty.
  - if:
      properties:
        output_destination_mode:
          const: confluence_draft
      required: [output_destination_mode]
    then:
      properties:
        destination_confluence_url:
          minLength: 1

  # jira_and_confluence_draft requires both URLs.
  - if:
      properties:
        output_destination_mode:
          const: jira_and_confluence_draft
      required: [output_destination_mode]
    then:
      properties:
        destination_ticket_url:
          minLength: 1
        destination_confluence_url:
          minLength: 1

  # external_postback_executed requires executed_by_operator AND at least one URL.
  - if:
      properties:
        output_destination_mode:
          const: external_postback_executed
      required: [output_destination_mode]
    then:
      properties:
        postback_execution_status:
          const: executed_by_operator
      anyOf:
        - properties:
            destination_ticket_url:
              minLength: 1
          required: [destination_ticket_url]
        - properties:
            destination_confluence_url:
              minLength: 1
          required: [destination_confluence_url]

  # Inverse: executed_by_operator requires external_postback_executed mode.
  - if:
      properties:
        postback_execution_status:
          const: executed_by_operator
      required: [postback_execution_status]
    then:
      properties:
        output_destination_mode:
          const: external_postback_executed

  # scoring_enabled implies expected_baseline_required and non-empty expected_root.
  - if:
      properties:
        scoring_enabled:
          const: true
      required: [scoring_enabled]
    then:
      properties:
        expected_baseline_required:
          const: true
        expected_root:
          minLength: 1

  # Sensitive-data confirmation must be true before run starts.
  - properties:
      sensitive_data_confirmed_redacted:
        const: true
    required: [sensitive_data_confirmed_redacted]
