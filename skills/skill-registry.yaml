schema_version: aisraf_skill_registry.v0_1_2
registry_id: skill-registry
title: AISRAF SAS Skill Registry
package_version: v0.1.2
owning_build_package: "05"
status: active
skill_count: 26
skill_family_counts:
  rs: 17
  dfd: 9
skill_families:
  - rs
  - dfd

purpose: >
  Register the canonical, reusable skill contracts for AISRAF SAS Prototype
  v0.1.2. Each skill contract describes a discrete reusable work unit with
  identity, purpose, required and optional inputs, required outputs, procedure,
  stop conditions, unknown handling, confidence handling, critical misses,
  human review gate, validation/scoring relationship, direct skill test, and
  out-of-scope claims. Skills wrap the Build Package 04 prompt cards. They are
  not executable runtime tools. Build Package 06 will wrap each skill in a PRA
  specification and a thin local .agent.md adapter.

scope:
  canonical_skill_root: skills
  skill_subfolders:
    - skills/rs
    - skills/dfd
  skill_contracts_are_runtime_tools: false
  skill_contracts_claim_pra_execution: false
  skill_contracts_claim_adapter_execution: false
  skill_contracts_claim_external_postback: false
  skill_contracts_claim_scoring_proof_outside_sk_accuracy_score: false
  skill_contracts_claim_release_or_diagram_export: false

parameter_contract:
  run_profile_source: runs/{{run_id}}/run-profile.yaml
  required_run_profile_fields:
    - "{{run_id}}"
    - "{{input_root}}"
    - "{{expected_root}}"
    - "{{output_root}}"
    - "{{mode}}"
    - "{{postback_execution_status}}"
    - "{{output_destination_mode}}"
  no_hardcoded_values:
    - run_id
    - sample_id
    - input_root
    - expected_root
    - output_root
    - source_ticket_url
    - destination_ticket_url
    - destination_confluence_url
    - output_destination_mode
    - postback_execution_status
  output_root_rule: every_skill_write_path_must_resolve_under_output_root
  schema_authority: config/run-profile.schema.yaml
  field_catalog: config/run-profile.field-catalog.md
  validation_rules: config/run-profile.validation-rules.md
  path_resolution_rules: config/path-resolution-rules.md
  sensitive_data_rules: config/sensitive-data-rules.md

required_skill_sections:
  - "1. Identity"
  - "2. Purpose"
  - "3. Required Inputs"
  - "4. Optional Inputs"
  - "5. Required Outputs"
  - "6. Procedure"
  - "7. Stop Conditions"
  - "8. Unknown Handling"
  - "9. Confidence Handling"
  - "10. Critical Misses"
  - "11. Human Review Gate"
  - "12. Validation / Scoring Relationship"
  - "13. Direct Skill Test"
  - "14. Not In Scope"

forbidden_claims:
  - pra_execution
  - agent_md_adapter_execution
  - jira_postback_execution
  - confluence_publication_execution
  - rovo_execution
  - mcp_execution
  - runtime_or_cloud_execution
  - database_execution
  - terraform_or_adk_execution
  - release_or_zip_export_from_a_skill
  - diagram_generation_from_a_skill
  - scoring_proof_outside_sk_accuracy_score
  - hardcoded_run_id_paths_or_urls
  - prompt_card_modification
  - baseline_modification_under_expected_root

placeholder_conventions:
  future_pra_owner_suffix: "(planned; defined in Build Package 06)"
  future_catalog_suffix: "(planned; defined in Build Package 07)"
  future_blueprint_suffix: "(planned; defined in Build Package 08)"
  future_template_suffix: "(planned; defined in Build Package 09)"
  future_baseline_suffix: "(planned; defined in Build Package 10)"
  future_format_contract_suffix: "(planned; defined in Build Package 14)"
  notes: >
    The future_pra_owner values in this registry are non-binding placeholders.
    Build Package 06 will replace each future_pra_owner with a concrete PRA-*
    specification path. A skill contract may not depend on a Package 06+
    artifact as a hard read.

compatibility_notes:
  prompt_registry_naming_drift:
    detail: >
      The Build Package 04 prompt registry (prompts/prompt-registry.yaml) uses
      placeholder names for two skills that diverge from the canonical Package
      05 names. The skill registry below is authoritative for SK-* names.
      Build Package 05 does not edit the prompt registry. Founder approved
      Q1 of the Package 05 plan.
    drift_pairs:
      - prompt_registry_placeholder: SK-DFD-LEGEND-NORMALIZE
        canonical_package_05_skill: SK-LEGEND-NORMALIZE
        prompt_id: PR-RS-03
        rationale: >
          The skill operates on RS-03 (Legend Normalize), an RS-family skill,
          not a DFD-family subskill. The DFD- prefix is dropped to match the
          RS family scope.
      - prompt_registry_placeholder: SK-SECURITY-STACK-DETECT
        canonical_package_05_skill: SK-SECURITY-STACK-ASSESS
        prompt_id: PR-RS-05
        rationale: >
          The skill assesses presence/absence and gap state, not just
          detection of stack markers. The verb is updated to "ASSESS".
  prompt_review_step_field_vs_skill_review_step:
    detail: >
      Some Build Package 04 prompt registry entries label the prompt's
      review_step using the prompt-sequence number (e.g. PR-RS-06 review_step
      "RS-06") even though the prompt covers a different SAS RS step
      (PR-RS-06 supports RS-08 / SK-DATA-FLOW-TABLE-BUILD). The skill
      registry below is authoritative for the canonical SAS RS-01..RS-17
      review-step semantic. The prompt registry is treated as a Package 04
      prompt-chain label and is not edited in Build Package 05. Founder
      approved Q2 of the Package 05 plan.
    crosswalk:
      - prompt_id: PR-RS-01
        prompt_review_step_field: RS-01
        canonical_skill_review_step: RS-01
      - prompt_id: PR-RS-02
        prompt_review_step_field: RS-02
        canonical_skill_review_step: RS-02
      - prompt_id: PR-RS-03
        prompt_review_step_field: RS-03
        canonical_skill_review_step: RS-03
      - prompt_id: PR-RS-04
        prompt_review_step_field: RS-04
        canonical_skill_review_steps: [RS-04, RS-05]
      - prompt_id: PR-RS-05
        prompt_review_step_field: RS-05
        canonical_skill_review_steps: [RS-06, RS-07]
      - prompt_id: PR-RS-06
        prompt_review_step_field: RS-06
        canonical_skill_review_step: RS-08
      - prompt_id: PR-RS-07
        prompt_review_step_field: RS-07-and-RS-12
        canonical_skill_review_steps: [RS-09, RS-12]
      - prompt_id: PR-RS-08
        prompt_review_step_field: RS-08
        canonical_skill_review_step: RS-10
      - prompt_id: PR-RS-09
        prompt_review_step_field: RS-09
        canonical_skill_review_step: RS-11
      - prompt_id: PR-RS-10
        prompt_review_step_field: RS-10
        canonical_skill_review_steps: [RS-13, RS-14]
      - prompt_id: PR-RS-11
        prompt_review_step_field: RS-11
        canonical_skill_review_step: RS-15
      - prompt_id: PR-RS-12
        prompt_review_step_field: RS-13
        canonical_skill_review_step: RS-16
      - prompt_id: PR-RS-13
        prompt_review_step_field: RS-14-through-RS-17
        canonical_skill_review_step: RS-17

planned_future_skills:
  notes: >
    These entries are NOT counted in skill_count. They are recorded for
    traceability against Package 04 prompt registry placeholders. Founder
    approved Q3 of the Package 05 plan: do not create a 27th skill.
  - planned_skill_id: SK-CHAIN-WRAPPER
    referenced_by_prompt_id: PR-RS-00
    referenced_by_prompt_file: prompts/rs/00-run-full-chain.prompt.md
    status: deferred
    detail: >
      The Package 04 prompt registry records future_skill_id
      "SK-CHAIN-WRAPPER (planned; defined in Build Package 05)" for the
      planned full-chain wrapper prompt. Build Package 05 does not author
      this skill contract. The wrapper prompt remains status: planned and
      writes no output. Future packages may re-evaluate whether a wrapper
      skill is needed; Build Package 05's 26-skill contract is fixed.

