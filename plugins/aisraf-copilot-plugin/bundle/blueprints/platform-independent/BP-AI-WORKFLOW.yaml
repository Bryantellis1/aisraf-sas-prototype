blueprint_id: BP-AI-WORKFLOW
blueprint_name: AI Workflow
owning_build_package: Build Package 08
status: active

purpose: >
  Recognize multi-step AI workflows that compose two or more AI
  sub-patterns (retrieval, model call, tool call, write-back, HITL
  approval, agent-to-agent) in a coordinated sequence. The blueprint
  scopes the catalog evidence required to recognize a coordinated
  workflow rather than independent calls, and notes that the effective
  AI Action Level equals the level of the highest-action-level step in
  the workflow.

applicability:
  category: platform-independent
  ai_action_levels:
    - AAL-L2
    - AAL-L3
    - AAL-L4
    - AAL-UNKNOWN
  primary_interaction_types:
    - IT-MODEL-CALL
    - IT-TOOL-CALL
    - IT-WRITE-BACK
    - IT-HITL-APPROVAL
    - IT-AGENT-TO-AGENT
    - IT-DATA-FLOW
  primary_concerns:
    - Which step in the workflow has the highest action level?
    - Are the steps coordinated (workflow) or independent (separate flows)?
    - Where in the workflow do HITL gates and write-back authorizations sit?
    - Which sub-pattern blueprints apply to which steps?
  not_applicable_when: |
    Only one AI interaction type is supported in the chain (use the
    matching single-pattern blueprint instead). The chain is plainly
    sequential without orchestration, but the orchestration record is
    unclear (consider keeping BP-AI-WORKFLOW as candidate while resolving
    targeted questions).

catalog_dependencies:
  - catalog_id: interaction-type-catalog
    family_id: interactions
    path: catalogs/interactions/interaction-type-catalog.yaml
    use: confirm two or more distinct AI interaction types are supported
  - catalog_id: flow-direction-catalog
    family_id: interactions
    path: catalogs/interactions/flow-direction-catalog.yaml
    use: classify per-step flow directions
  - catalog_id: flow-evidence-rule-catalog
    family_id: interactions
    path: catalogs/interactions/flow-evidence-rule-catalog.yaml
    use: enforce per-flow evidence rules across all workflow steps
  - catalog_id: boundary-type-catalog
    family_id: boundaries
    path: catalogs/boundaries/boundary-type-catalog.yaml
    use: identify boundaries crossed at each step
  - catalog_id: boundary-crossing-rule-catalog
    family_id: boundaries
    path: catalogs/boundaries/boundary-crossing-rule-catalog.yaml
    use: detect internet, SaaS, and trust-zone crossings per step
  - catalog_id: trust-zone-catalog
    family_id: boundaries
    path: catalogs/boundaries/trust-zone-catalog.yaml
    use: classify zones at each step transition
  - catalog_id: authentication-catalog
    family_id: identity-access
    path: catalogs/identity-access/authentication-catalog.yaml
    use: identify auth markers per step
  - catalog_id: authorization-catalog
    family_id: identity-access
    path: catalogs/identity-access/authorization-catalog.yaml
    use: identify authorization values at write-back, HITL, and tool steps
  - catalog_id: identity-evidence-rule-catalog
    family_id: identity-access
    path: catalogs/identity-access/identity-evidence-rule-catalog.yaml
    use: enforce identity evidence rules across all steps
  - catalog_id: data-class-catalog
    family_id: data-protection
    path: catalogs/data-protection/data-class-catalog.yaml
    use: identify data class on inter-step flows
  - catalog_id: transport-protection-catalog
    family_id: data-protection
    path: catalogs/data-protection/transport-protection-catalog.yaml
    use: identify transit encryption per step
  - catalog_id: at-rest-protection-catalog
    family_id: data-protection
    path: catalogs/data-protection/at-rest-protection-catalog.yaml
    use: identify at-rest protection on intermediate stores
  - catalog_id: confidence-level-catalog
    family_id: data-protection
    path: catalogs/data-protection/confidence-level-catalog.yaml
    use: cross-cutting confidence levels for blueprint match disposition
  - catalog_id: security-stack-marker-catalog
    family_id: security-stacks
    path: catalogs/security-stacks/security-stack-marker-catalog.yaml
    use: identify gateway / identity-checkpoint markers at workflow boundaries
  - catalog_id: control-signal-catalog
    family_id: security-stacks
    path: catalogs/security-stacks/control-signal-catalog.yaml
    use: classify control signal values per step
  - catalog_id: ai-action-level-catalog
    family_id: review
    path: catalogs/review/ai-action-level-catalog.yaml
    use: scope of AI Action Levels supported across composed steps
  - catalog_id: finding-category-catalog
    family_id: review
    path: catalogs/review/finding-category-catalog.yaml
    use: scope of supported finding categories
  - catalog_id: recommendation-type-catalog
    family_id: review
    path: catalogs/review/recommendation-type-catalog.yaml
    use: scope of supported recommendation types
  - catalog_id: review-status-catalog
    family_id: review
    path: catalogs/review/review-status-catalog.yaml
    use: identify review-status values when handing off composed-workflow findings
  - catalog_id: proof-vs-signal-rule-catalog
    family_id: security-stacks
    path: catalogs/security-stacks/proof-vs-signal-rule-catalog.yaml
    use: global signal-vs-proof rule referenced by every blueprint claim

required_inputs:
  - input_id: review_table_chain
    description: chain of flow rows with interaction types resolved across all workflow steps
    source: skills/rs/SK-DATA-FLOW-TABLE-BUILD.md output
  - input_id: ai_action_level_classification
    description: AI Action Level result for the highest-action-level step (drives effective level)
    source: skills/rs/SK-AI-ACTION-LEVEL-CLASSIFY.md output
  - input_id: boundary_crossing_records
    description: boundary-crossing detection results across all workflow steps
    source: skills/rs/SK-BOUNDARY-CROSSING-DETECT.md output
  - input_id: sub_pattern_match_records
    description: blueprint match results for sub-pattern blueprints (BP-RAG-RETRIEVAL, BP-MODEL-ENDPOINT-CALL, BP-TOOL-USING-AGENT, BP-API-WRITEBACK, BP-HITL-APPROVAL, BP-AGENT-TO-AGENT, BP-AI-SAAS-INTEGRATION) per step
    source: skills/rs/SK-REVIEW-BLUEPRINT-MATCH.md output for the sub-patterns
  - input_id: confidence_levels
    description: per-row confidence values
    source: catalogs/data-protection/confidence-level-catalog.yaml

match_conditions:
  - condition_id: BP-AI-WORKFLOW-MATCH-01
    description: Two or more distinct AI interaction types are supported in a coordinated chain (e.g., IT-MODEL-CALL plus IT-TOOL-CALL, or IT-MODEL-CALL plus IT-WRITE-BACK with HITL between).
    catalog_evidence:
      - catalog_id: interaction-type-catalog
        required_at_least_two_of: [IT-MODEL-CALL, IT-TOOL-CALL, IT-WRITE-BACK, IT-HITL-APPROVAL, IT-AGENT-TO-AGENT]

candidate_conditions:
  - condition_id: BP-AI-WORKFLOW-CANDIDATE-01
    description: Multiple AI interactions are present but coordination (orchestration vs independent calls) is unclear.
    catalog_evidence:
      - catalog_id: interaction-type-catalog
        partial_support_values: [IT-MODEL-CALL, IT-TOOL-CALL, IT-WRITE-BACK, IT-UNKNOWN]
      - catalog_id: confidence-level-catalog
        partial_support_values: [medium, low]

no_match_conditions:
  - condition_id: BP-AI-WORKFLOW-NO-MATCH-01
    description: Only one AI interaction type is supported in the chain; the matching single-pattern blueprint is the primary match.
    catalog_evidence:
      - catalog_id: interaction-type-catalog
        single_value_supported: true

unknown_conditions:
  - condition_id: BP-AI-WORKFLOW-UNKNOWN-01
    description: Multiple interactions are visible but their coordination and step-ordering cannot be determined.
    catalog_evidence:
      - catalog_id: interaction-type-catalog
        unknown_when_value: IT-UNKNOWN
      - catalog_id: confidence-level-catalog
        unknown_when_value: unknown

material_missing_facts:
  - fact_id: BP-AI-WORKFLOW-MMF-01
    description: Which step in the workflow has the highest action level (drives the effective AI Action Level)?
    catalog_reference: ai-action-level-catalog
    affects:
      - ai_action_level
      - finding_category
    targeted_question_owner: skills/rs/SK-TARGETED-QUESTION-GENERATE.md
  - fact_id: BP-AI-WORKFLOW-MMF-02
    description: Does any step write to a data store or trigger an external action (write-back step elevates effective level)?
    catalog_reference: interaction-type-catalog
    affects:
      - ai_action_level
      - blueprint_match
    targeted_question_owner: skills/rs/SK-TARGETED-QUESTION-GENERATE.md
  - fact_id: BP-AI-WORKFLOW-MMF-03
    description: Does the HITL gate cover the highest-action-level step or only a lower-level step?
    catalog_reference: interaction-type-catalog
    affects:
      - ai_action_level
      - finding_category
    targeted_question_owner: skills/rs/SK-TARGETED-QUESTION-GENERATE.md
  - fact_id: BP-AI-WORKFLOW-MMF-04
    description: Are any steps executed by sub-agents (BP-AGENT-TO-AGENT secondary candidate)?
    catalog_reference: interaction-type-catalog
    affects:
      - blueprint_match
    targeted_question_owner: skills/rs/SK-TARGETED-QUESTION-GENERATE.md

