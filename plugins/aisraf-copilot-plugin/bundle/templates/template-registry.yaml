# ============================================================================
# Compatibility notes.
# ============================================================================
compatibility_notes:
  v0_01_template_inventory_collapse:
    decision: applied
    detail: >
      The v0.01 reference workspace had 33 template files including stub
      placeholders (handoff-pack, internal-data-flow-review-table,
      validation-ticket-note, accuracy-score, input-inventory,
      missing-material-fact, security-stack-assessment) and several row-only
      templates (boundary-crossing, component-table, flow-table,
      dfd-visible-object, visible-dfd-object, legend-normalization,
      process-step, skill-process-row, targeted-question, unknown-field).
      Build Package 09 collapses these into 31 governed templates covering
      27 file-shape outputs, 1 Jira draft, 1 Confluence draft, and 2 run-log
      row patterns. The v0.01 diagram-spec-template, evidence-record-template,
      and recommendation-rule-template are rejected because Build Package 13
      owns diagrams, the v0.1.2 evidence model is collapsed into 00-run-log.md,
      and catalogs/review/recommendation-type-catalog.yaml owns the
      recommendation taxonomy.
  run_profile_template_yaml_location:
    decision: out_of_scope_for_package_09
    detail: >
      The v0.01 templates/run-profile-template.yaml lives at
      config/run-profile.template.yaml in v0.1.2 under Build Package 02
      ownership. Build Package 09 does not relocate or duplicate it.
  connector_field_placeholders_in_jira_confluence_drafts:
    decision: descriptive_reference_only
    detail: >
      The seven approved placeholder variables are the only {{...}} tokens
      allowed inside any template. Other run-profile schema fields
      (jira_connector_status, confluence_connector_status,
      rovo_mcp_available, mcp_execution_status, sample_id,
      source_ticket_url, destination_ticket_url,
      destination_confluence_url, operator_name, reviewer_name) are
      referenced descriptively as
      [copy from runs/{{run_id}}/run-profile.yaml#field_name].
      All connector-related fields used by the Jira/Confluence drafts
      and the post-back row exist in the current Package 02 schema; no
      schema invention is required.
  founder_q1_run_log_split:
    decision: applied
    detail: >
      File-level shape lives in templates/output/output-00-run-log-template.md;
      per-step row pattern lives in templates/run/run-log-entry-row-template.md;
      operator post-back row pattern lives in
      templates/run/postback-log-entry-row-template.md.
  founder_q3_no_catalog_value_enumeration:
    decision: applied
    detail: >
      Templates use placeholder-by-catalog-path style. Catalog file paths
      are referenced; catalog entries are not enumerated; controlled values
      are not introduced.
  founder_q4_naming_convention:
    decision: applied
    detail: >
      Output templates use the output-NN-name-template.md pattern so that
      the template file is unambiguously distinct from the future
      runs/<run_id>/<output_root>/NN-name.md generated artifact.

# Future-only (deferred).
planned_future_templates: []
