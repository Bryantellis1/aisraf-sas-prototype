registry_id: aisraf-template-registry
schema_version: aisraf_template_registry.v0_1_2
package_version: v0.1.2
title: AISRAF SAS Template Registry
owning_build_package: Build Package 09
status: active

# Headline counts (founder decision Q5 — Build Package 09 plan).
template_count: 31
template_family_count: 4
template_family_counts:
  output: 27
  jira: 1
  confluence: 1
  run: 2
total_files_under_templates: 37   # 31 templates + 1 registry + 5 READMEs (root + 4 family)

unknown_value: unknown

purpose: >
  Index every Build Package 09 template, declare its consumers, declare its
  output boundary, and pin its allowed placeholder set. Templates define
  output shape only. They do not execute the review; do not compute
  severity, score, AI Action Level, or blueprint match; do not invent
  finding facts or recommendation prose; do not claim Jira, Confluence,
  Rovo, MCP, runtime, cloud, ADK, database, Terraform, or release
  execution; and do not override catalogs or blueprints.

scope:
  canonical_template_root: templates
  template_subfolders:
    - templates/output
    - templates/jira
    - templates/confluence
    - templates/run
  templates_are_runtime_tools: false
  templates_compute_severity_or_score_or_action_level_or_match: false
  templates_invent_findings_or_recommendations: false
  templates_claim_external_postback: false
  templates_claim_runtime_or_cloud_execution: false
  templates_override_catalogs_or_blueprints: false

# Allowed run-profile variable set (the 7 approved placeholders only).
parameter_contract:
  run_profile_source: runs/{{run_id}}/run-profile.yaml
  required_run_profile_fields:
    - "{{run_id}}"
    - "{{input_root}}"
    - "{{expected_root}}"
    - "{{output_root}}"
    - "{{mode}}"
    - "{{postback_execution_status}}"
    - "{{output_destination_mode}}"
  rejected_non_schema_variables:
    - "{{catalog_root}}"
    - "{{prompt_root}}"
    - "{{skill_root}}"
    - "{{template_root}}"
    - "{{diagram_root}}"
    - "{{validation_root}}"
  output_root_rule: every_template_write_path_must_resolve_under_output_root
  schema_authority: config/run-profile.schema.yaml
  field_catalog: config/run-profile.field-catalog.md
  validation_rules: config/run-profile.validation-rules.md
  path_resolution_rules: config/path-resolution-rules.md
  sensitive_data_rules: config/sensitive-data-rules.md
  descriptive_field_reference_pattern: "[copy from runs/{{run_id}}/run-profile.yaml#field_name]"
  descriptive_field_reference_use_when: >
    Other run-profile schema fields (sample_id, source_ticket_url,
    destination_ticket_url, destination_confluence_url,
    jira_connector_status, confluence_connector_status,
    rovo_mcp_available, mcp_execution_status, operator_name,
    reviewer_name) are referenced descriptively in template bodies as
    [copy from runs/{{run_id}}/run-profile.yaml#field_name] rather than
    as templated {{placeholders}}.

# Required metadata block in every template (founder Q-block).
required_template_metadata_fields:
  - template_id
  - template_name
  - owning_build_package
  - status
  - purpose
  - intended_output
  - consumers
  - inputs_expected
  - placeholders
  - required_sections
  - prohibited_content
  - output_boundary
  - source_reference
  - version_notes

# Global prohibited claims (mirrors Package 07/08 shape).
prohibited_claims:
  - runtime_or_cloud_execution
  - mcp_jira_confluence_rovo_execution
  - adk_or_vertex_or_gcp_execution
  - database_or_terraform_execution
  - severity_computed_inside_template
  - score_computed_inside_template
  - ai_action_level_computed_inside_template
  - blueprint_match_decided_inside_template
  - finding_facts_invented_inside_template
  - recommendation_prose_invented_inside_template
  - external_postback_claimed_inside_template
  - catalog_value_introduced_inside_template
  - controlled_value_enumerated_inside_template
  - blueprint_definition_overridden_inside_template
  - implementation_proof_claimed_inside_template

# Founder Q-block — six explicit runtime/external execution flags.
runtime_and_external_execution:
  runtime_deployed: false
  adk_deployed: false
  cloud_resources_created: false
  database_jobs_created: false
  mcp_execution_available: false
  jira_confluence_execution_available: false

# Build Package 09 must not edit any of these registries.
sealed_upstream_registries:
  - prompts/prompt-registry.yaml
  - skills/skill-registry.yaml
  - prototype-agents/prototype-agent-registry.yaml
  - catalogs/catalog-registry.yaml
  - blueprints/blueprint-registry.yaml
sealed_upstream_policy: >
  Build Package 09 must not modify any of the upstream registries above.
  All template-level consumer mapping is recorded in this
  template-registry.yaml, in validation/template-registry-checklist.md,
  and in validation/template-consumption-checklist.md.

# Founder decision summary (recorded for audit).
founder_decisions:
  q1_run_log_template_split: approved_two_template_model_file_shape_in_output_row_pattern_in_run
  q2_connector_field_placeholders: approved_use_only_fields_present_in_current_run_profile_schema
  q3_controlled_catalog_values: approved_placeholder_by_catalog_path_no_enumeration
  q4_naming_convention: approved_output_NN_name_template_md
  q5_template_count: approved_lock_at_31_with_4_families_27_1_1_2
  q6_test_aisraf_package_patch: approved_surgical_five_change_patch

# Output destination modes that templates can format for (from run-profile schema enum).
output_destination_modes_supported:
  - local_only
  - jira_draft
  - confluence_draft
  - jira_and_confluence_draft
  - external_postback_executed

# Postback execution status values templates may surface in claim blocks.
postback_execution_status_values:
  - deferred
  - formatted_only
  - executed_by_operator
  - not_attempted

