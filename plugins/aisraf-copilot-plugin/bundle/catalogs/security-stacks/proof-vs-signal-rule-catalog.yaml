unknown_value: unknown

evidence_rules:
  - rule_id: ER-PVS-01
    rule: This catalog IS the global proof-vs-signal rule. All other catalogs reference it.
  - rule_id: ER-PVS-02
    rule: A review signal is something visible in the design (a label, marker, icon, shape, name) or supported by source notes. A signal does not, by itself, prove implementation, deployment, runtime, configuration, enforcement, coverage, key management, ownership, or policy effectiveness.
  - rule_id: ER-PVS-03
    rule: Implementation proof requires source-supported, materially scoped evidence (e.g., a configuration extract, an audit log entry, a control-test result, a documented change record, or a verifiable artifact reference). Catalogs do not produce proof; they record what level of support exists.
  - rule_id: ER-PVS-04
    rule: When a marker is visible but proof is not available, fields requiring proof remain unknown. The reviewer routes the gap to a missing-fact question or a validation-note ticket, never silently fills it.

prohibited_claims:
  - implementation_proof_from_marker_alone
  - approved_security_stack_from_diamond_alone
  - authorization_from_authentication_marker_alone
  - at_rest_protection_from_transit_marker_alone
  - transit_protection_from_at_rest_marker_alone
  - key_management_from_secret_management_label_alone
  - runtime_deployment_from_cloud_service_name_alone
  - production_configuration_from_design_label_alone
  - control_effectiveness_from_marker_visibility_alone
  - identity_authorization_scope_from_identity_provider_label_alone
  - monitoring_effectiveness_from_logging_label_alone
  - encryption_scope_from_encryption_marker_alone
  - blueprint_match_from_catalog_entry_alone

controlled_value_policy:
  closed_list: true
  unknown_allowed: true
  extension_requires: future governed catalog update
  free_text_allowed_only_in:
    - notes
    - evidence_summary

anti_inference_rules:
  - Visible label is a review signal, not implementation proof.
  - Cloud service icon or label does not prove deployment, configuration, access policy, encryption, or runtime state.
  - Authentication evidence does not prove authorization scope.
  - Transport protection does not prove at-rest protection.
  - Marker presence does not prove control effectiveness.
  - Unknown stays unknown until supported by evidence.
  - Future-state diagram labels do not prove current runtime.
  - Component-level marker is a component signal only and does not propagate to every connected flow.

