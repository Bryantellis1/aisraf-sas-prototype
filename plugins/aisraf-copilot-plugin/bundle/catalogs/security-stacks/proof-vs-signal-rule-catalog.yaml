catalog_id: proof-vs-signal-rule-catalog
catalog_name: Proof vs. Signal Rule Catalog
schema_version: aisraf_proof_vs_signal_rule_catalog.v0_1_2
owning_build_package: Build Package 07
status: active
global_rule: true
applies_to_all_catalogs: true

purpose: >
  Define the global rules that prevent visible markers, icons, labels, gateway
  shapes, diamonds, cloud service names, secret-management labels, and naming
  conventions from being treated as implementation proof. Every other catalog
  in catalogs/ references this catalog in evidence_rules. Whenever a reviewer is
  tempted to convert a visible signal into a runtime, control-effectiveness, or
  policy-enforcement claim, the rule that disallows that conversion lives here.

