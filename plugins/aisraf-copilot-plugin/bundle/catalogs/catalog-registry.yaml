registry_id: aisraf-catalog-registry
schema_version: aisraf_catalog_registry.v0_1_2
package_version: v0.1.2
owning_build_package: Build Package 07
status: active

# Headline counts.
# The catalog inventory below is the authoritative list. The numerical totals
# match the actual files committed in Build Package 07.
catalog_count: 24
catalog_family_count: 7
readme_count: 8
total_files_under_catalogs: 33

# Note on count freeze.
# The founder Build Package 07 approval (Q7) recorded "catalog_count: 28" and
# "38 total files under catalogs/" alongside an explicit file list. The
# explicit file list contains 24 controlled-vocabulary YAML catalogs (not 28)
# and 33 total files (not 38). Build Package 07 implements the explicit file
# list verbatim and records the accurate counts here. The 28/38 figures are
# captured in compatibility_notes as documented arithmetic discrepancy for
# human review, with no upstream edits.

unknown_value: unknown

global_evidence_rules:
  - rule_id: GER-01
    rule: Visible label is a review signal, not implementation proof. Every catalog references catalogs/security-stacks/proof-vs-signal-rule-catalog.yaml in its evidence_rules.
  - rule_id: GER-02
    rule: Cloud service icon or label does not prove deployment, configuration, access policy, encryption, or runtime state.
  - rule_id: GER-03
    rule: Authentication evidence does not prove authorization scope.
  - rule_id: GER-04
    rule: Transport protection does not prove at-rest protection.
  - rule_id: GER-05
    rule: Marker presence does not prove control effectiveness.
  - rule_id: GER-06
    rule: Unknown stays unknown until supported by evidence.
  - rule_id: GER-07
    rule: Component-level marker is a component signal only and does not propagate to every connected flow.
  - rule_id: GER-08
    rule: Future-state diagram labels do not prove current runtime.

prohibited_claims:
  - runtime_or_cloud_execution
  - mcp_jira_confluence_rovo_execution
  - adk_or_vertex_or_gcp_execution
  - database_or_terraform_execution
  - implementation_proof_from_marker_alone
  - approved_security_stack_from_diamond_alone
  - authorization_from_authentication_marker_alone
  - blueprint_match_from_catalog_entry_alone
  - severity_or_scoring_outcome_from_catalog_entry_alone

cross_cutting_catalogs:
  - catalog_id: proof-vs-signal-rule-catalog
    family_id: security-stacks
    path: catalogs/security-stacks/proof-vs-signal-rule-catalog.yaml
    flag: global_rule
    referenced_by_every_catalog_in_evidence_rules: true
  - catalog_id: confidence-level-catalog
    family_id: data-protection
    path: catalogs/data-protection/confidence-level-catalog.yaml
    flag: cross_cutting_catalog
    primary_family: data-protection
    applies_to:
      - dfd extraction
      - annotation resolution
      - component classification
      - boundary classification
      - finding confidence
      - accuracy scoring

catalog_families:
  - family_id: components
    title: Components
    path: catalogs/components/
    purpose: Component types, component roles in flow context, and component evidence rules.
    catalog_files:
      - catalogs/components/component-type-catalog.yaml
      - catalogs/components/component-role-catalog.yaml
      - catalogs/components/component-evidence-rule-catalog.yaml
    catalog_file_count: 3
  - family_id: interactions
    title: Interactions
    path: catalogs/interactions/
    purpose: Interaction types, flow direction, and flow evidence rules.
    catalog_files:
      - catalogs/interactions/interaction-type-catalog.yaml
      - catalogs/interactions/flow-direction-catalog.yaml
      - catalogs/interactions/flow-evidence-rule-catalog.yaml
    catalog_file_count: 3
  - family_id: boundaries
    title: Boundaries
    path: catalogs/boundaries/
    purpose: Boundary types and extraction order, boundary-crossing rules, and trust zones.
    catalog_files:
      - catalogs/boundaries/boundary-type-catalog.yaml
      - catalogs/boundaries/boundary-crossing-rule-catalog.yaml
      - catalogs/boundaries/trust-zone-catalog.yaml
    catalog_file_count: 3
  - family_id: identity-access
    title: Identity And Access
    path: catalogs/identity-access/
    purpose: Authentication marker families, authorization values, and identity evidence rules.
    catalog_files:
      - catalogs/identity-access/authentication-catalog.yaml
      - catalogs/identity-access/authorization-catalog.yaml
      - catalogs/identity-access/identity-evidence-rule-catalog.yaml
    catalog_file_count: 3
  - family_id: data-protection
    title: Data Protection
    path: catalogs/data-protection/
    purpose: Data class, transport protection, at-rest protection, and the cross-cutting confidence catalog.
    catalog_files:
      - catalogs/data-protection/data-class-catalog.yaml
      - catalogs/data-protection/transport-protection-catalog.yaml
      - catalogs/data-protection/at-rest-protection-catalog.yaml
      - catalogs/data-protection/confidence-level-catalog.yaml
    catalog_file_count: 4
  - family_id: security-stacks
    title: Security Stacks
    path: catalogs/security-stacks/
    purpose: Security-stack markers, control signals, and the global proof-vs-signal rule catalog.
    catalog_files:
      - catalogs/security-stacks/security-stack-marker-catalog.yaml
      - catalogs/security-stacks/control-signal-catalog.yaml
      - catalogs/security-stacks/proof-vs-signal-rule-catalog.yaml
    catalog_file_count: 3
  - family_id: review
    title: Review
    path: catalogs/review/
    purpose: Finding categories, severity, recommendation type, AI Action Level, and review status.
    catalog_files:
      - catalogs/review/finding-category-catalog.yaml
      - catalogs/review/severity-catalog.yaml
      - catalogs/review/recommendation-type-catalog.yaml
      - catalogs/review/ai-action-level-catalog.yaml
      - catalogs/review/review-status-catalog.yaml
    catalog_file_count: 5

catalogs:
  - catalog_id: component-type-catalog
    family_id: components
    path: catalogs/components/component-type-catalog.yaml
    purpose: Closed list of component types for visible DFD boxes, actors, services, stores, and grouping containers.
  - catalog_id: component-role-catalog
    family_id: components
    path: catalogs/components/component-role-catalog.yaml
    purpose: Closed list of review roles a component plays in a given flow context.
  - catalog_id: component-evidence-rule-catalog
    family_id: components
    path: catalogs/components/component-evidence-rule-catalog.yaml
    purpose: Evidence rules governing component type and role claims.
  - catalog_id: interaction-type-catalog
    family_id: interactions
    path: catalogs/interactions/interaction-type-catalog.yaml
    purpose: Closed list of interaction types (data flow, model call, tool call, write-back, agent-to-agent, HITL approval, observability, control plane).
  - catalog_id: flow-direction-catalog
    family_id: interactions
    path: catalogs/interactions/flow-direction-catalog.yaml
    purpose: Closed list of flow direction values (one_way, request_response, bidirectional, broadcast, unknown).
  - catalog_id: flow-evidence-rule-catalog
    family_id: interactions
    path: catalogs/interactions/flow-evidence-rule-catalog.yaml
    purpose: Evidence rules governing flow-level claims and the artifact-class non-propagation rule.
  - catalog_id: boundary-type-catalog
    family_id: boundaries
    path: catalogs/boundaries/boundary-type-catalog.yaml
    purpose: Closed list of boundary types and the largest-to-smallest extraction order.
  - catalog_id: boundary-crossing-rule-catalog
    family_id: boundaries
    path: catalogs/boundaries/boundary-crossing-rule-catalog.yaml
    purpose: Rules determining whether a flow crosses a boundary and what evidence is required.
  - catalog_id: trust-zone-catalog
    family_id: boundaries
    path: catalogs/boundaries/trust-zone-catalog.yaml
    purpose: Closed list of trust/functional zone labels for source and destination zone fields.
  - catalog_id: authentication-catalog
    family_id: identity-access
    path: catalogs/identity-access/authentication-catalog.yaml
    purpose: Closed list of authentication marker families (SA#, CA#, IA#, GSA#, unknown).
  - catalog_id: authorization-catalog
    family_id: identity-access
    path: catalogs/identity-access/authorization-catalog.yaml
    purpose: Closed list of authorization values (present, partial, planned, unknown).
  - catalog_id: identity-evidence-rule-catalog
    family_id: identity-access
    path: catalogs/identity-access/identity-evidence-rule-catalog.yaml
    purpose: Evidence rules covering token validation, least privilege, role scope, approval authority, and implementation proof.
  - catalog_id: data-class-catalog
    family_id: data-protection
    path: catalogs/data-protection/data-class-catalog.yaml
    purpose: Closed list of data class values (C1-C5) plus PCI/PAN suffix and protection sub-markers (E#, T#, U#, H#).
  - catalog_id: transport-protection-catalog
    family_id: data-protection
    path: catalogs/data-protection/transport-protection-catalog.yaml
    purpose: Closed list of transport-protection values (T# token, HTTPS/TLS label, mutual TLS, plain text, unknown).
  - catalog_id: at-rest-protection-catalog
    family_id: data-protection
    path: catalogs/data-protection/at-rest-protection-catalog.yaml
    purpose: Closed list of at-rest protection values driven by R# tokens and storage-state words (Enc, Tok, Trun, NoCC, Clr).
  - catalog_id: confidence-level-catalog
    family_id: data-protection
    path: catalogs/data-protection/confidence-level-catalog.yaml
    purpose: Cross-cutting closed list of confidence levels (high, medium, low, unknown) used by every catalog.
    cross_cutting_catalog: true
  - catalog_id: security-stack-marker-catalog
    family_id: security-stacks
    path: catalogs/security-stacks/security-stack-marker-catalog.yaml
    purpose: Closed list of visible stack-marker forms (diamond, gateway, identity checkpoint, logging, encryption, secret-management, S# protocol, unknown).
  - catalog_id: control-signal-catalog
    family_id: security-stacks
    path: catalogs/security-stacks/control-signal-catalog.yaml
    purpose: Closed list of derived control signal values (visible, partial, missing, planned, unknown).
  - catalog_id: proof-vs-signal-rule-catalog
    family_id: security-stacks
    path: catalogs/security-stacks/proof-vs-signal-rule-catalog.yaml
    purpose: Global rule catalog enumerating signal-vs-proof rules referenced by every other catalog in evidence_rules.
    global_rule: true
  - catalog_id: finding-category-catalog
    family_id: review
    path: catalogs/review/finding-category-catalog.yaml
    purpose: Closed list of finding categories (Gap, Deficiency, Evidence Gap, Observation, Requirement, Risk, Out of Scope, Unknown).
  - catalog_id: severity-catalog
    family_id: review
    path: catalogs/review/severity-catalog.yaml
    purpose: Closed list of severity values (Critical, High, Medium, Low, Informational, Unknown).
  - catalog_id: recommendation-type-catalog
    family_id: review
    path: catalogs/review/recommendation-type-catalog.yaml
    purpose: Closed list of recommendation type categories (no prose, no template language).
  - catalog_id: ai-action-level-catalog
    family_id: review
    path: catalogs/review/ai-action-level-catalog.yaml
    purpose: Closed list of AI Action Levels (L0-L4 plus Unknown). Definitions only; computation belongs to skills and human review.
  - catalog_id: review-status-catalog
    family_id: review
    path: catalogs/review/review-status-catalog.yaml
    purpose: Closed list of review workflow status values (in_progress, awaiting_inputs, awaiting_human_review, complete, blocked, withdrawn, unknown).

