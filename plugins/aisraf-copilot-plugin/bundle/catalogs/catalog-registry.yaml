compatibility_notes:
  documented_count_arithmetic_discrepancy:
    issue: |
      The Build Package 07 founder approval (Q7) recorded
      catalog_count: 28 and 38 total files under catalogs/, alongside an
      explicit file list. The explicit file list contains 24
      controlled-vocabulary YAML catalogs (3+3+3+3+4+3+5) and 33 total
      files (24 + 1 catalog-registry.yaml + 8 READMEs).
    package_07_action: |
      Implement the explicit file list verbatim and record the accurate
      counts (24 catalogs, 33 total files) in this registry. The 28/38
      figures from the approval are documented here for transparency.
    recommended_future_fix: |
      Founder confirms the catalog inventory at next governed update
      (either accept 24 as the final count or expand to 28 by adding
      four additional controlled-vocabulary catalogs through a separate
      governed change).

  known_upstream_drift:
    known_upstream_drift: true
    source_file: prototype-agents/prototype-agent-registry.yaml
    reason: |
      Package 06 registry contains a non-Package-02 variable reference
      ({{catalog_root}}) inside its rejected_non_schema_variables list at
      line 45. The reference is an explicit "rejected" listing — the
      registry is calling out variables that must NOT be introduced.
      Build Package 07 has confirmed this and will not introduce
      {{catalog_root}} anywhere. No upstream edit is performed in
      Build Package 07.
    package_07_action: documented only; no upstream edit.
    recommended_future_fix: |
      Controlled cleanup in a future package allowed to update the
      prototype-agent registry. Until then, the rejected_non_schema_variables
      block is correctly serving its purpose by signaling that
      {{catalog_root}} is forbidden.

version_notes: >
  Initial Build Package 07 release. Catalog registry indexes 24
  controlled-vocabulary YAML catalogs across 7 families, plus the
  cross-cutting confidence-level-catalog and the global
  proof-vs-signal-rule-catalog. Consumer mapping covers 23 prompts (with
  PR-RS-00 catalog-empty per Build Package 04 status=planned), 26 skills,
  8 PRAs, and 7 .agent.md adapters. No upstream prompt, skill, PRA, or
  adapter registry was modified.
