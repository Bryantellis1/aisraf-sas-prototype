# Future runtime adapters are documented as strategy-only at WP-15.
future_runtime_projection:
  status: deferred_to_WP-15
  scope: strategy_only_no_implementation
  candidate_runtimes:
    - microsoft_agent_framework
    - azure_ai_foundry
    - google_adk
    - anthropic_claude
  authoring_rule: |
    No runtime adapter is authored at WP-12C-K2, K3, K4, WP-12C-L, WP-13,
    or WP-14. WP-15 documents per-runtime translation rules descriptively
    only; no runtime is implemented by WP-15.

# Falsifiers — break any of these and the manifest is invalid.
falsifiers:
  - rule: "AISRAF Copilot plugin scaffold is a projection package."
    falsifier: "Any plugin file containing a canonical body string of length 200+ chars."
  - rule: "Canonical source of truth remains outside the plugin."
    falsifier: "Any plugin file overriding a canonical surface."
  - rule: "K2 creates scaffold only."
    falsifier: "Any subfolder under plugins/aisraf-copilot-plugin/ at K2 close."
  - rule: "K3A defines projection assembly contract only."
    falsifier: "Any bundle folder, build script, bundle manifest, validator patch, install attempt, or smoke execution created in K3A."
  - rule: "K3B must patch validators before bundle creation."
    falsifier: "plugins/aisraf-copilot-plugin/bundle/ created before K3B validator coverage passes."
  - rule: "K3C is the first bundle creation gate."
    falsifier: "Any plugin bundle assembled before K3C opens."
  - rule: "K4 will validate package completeness."
    falsifier: "A package-complete verdict before K4 lint runs."
  - rule: "WP-12C-L will test plugin install and smoke behavior."
    falsifier: "An install attempt before WP-12C-L opens."
  - rule: "External execution is disabled."
    falsifier: "Any plugin file claiming runtime, cloud, MCP, ADK, Foundry, Claude, Jira, Confluence, database, Terraform, or post-back execution."
  - rule: "Memory scope is run-scoped files only."
    falsifier: "Any persistent agent-side memory introduced."

# Stop conditions — halt and escalate to the founder if any of these fire.
stop_conditions:
  - canonical_body_copied_into_plugin_file
  - plugin_subfolder_created_in_K2
  - plugin_subfolder_created_in_K3A
  - bundle_target_created_before_K3B_validator_patch
  - build_script_authored_in_K3A
  - validator_modified_in_K3A
  - plugin_file_claims_external_execution
  - install_attempt_before_WP-12C-L_opens
  - runs_RUN_001_modified_by_plugin_authoring
  - samples_modified_by_plugin_authoring
  - sealed_canonical_or_projection_surface_modified
  - diagrams_or_release_touched_by_plugin_authoring
  - claude_adapter_authored_ahead_of_WP-15
