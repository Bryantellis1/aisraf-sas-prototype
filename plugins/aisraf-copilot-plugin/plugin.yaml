    - plugins/aisraf-copilot-plugin/EVIDENCE-CHECKLIST.md
    - plugins/aisraf-copilot-plugin/plugin.yaml
  anchors_added:
    operator_quick_start: README.md#0-operator-quick-start
    role_journey_map: README.md#4a-role-journey-map
    layered_projection_model: README.md#4b-layered-projection-model
    role_update_procedure: PLUGIN-PACKAGING-PLAN.md#3a-role-update--extension-procedure
    future_interactive_smoke_script: PLUGIN-TEST-CARD.md#30-future-interactive-smoke-script
    k2a_evidence_rows: EVIDENCE-CHECKLIST.md#25-k2a-ux--operability-evidence
  no_install_attempted: true
  no_bundle_assembled: true
  no_canonical_body_copied: true
  no_plugin_subfolder_created: true

# WP-12C-K3A — projection assembly contract / validator plan (no bundle).
audit_k3a:
  status: applied
  scope: projection_assembly_contract_and_validator_plan_only
  documented_in:
    - plugins/aisraf-copilot-plugin/PLUGIN-PACKAGING-PLAN.md
    - plugins/aisraf-copilot-plugin/EVIDENCE-CHECKLIST.md
    - plugins/aisraf-copilot-plugin/plugin.yaml
  proposed_bundle_target: plugins/aisraf-copilot-plugin/bundle/
  proposed_build_script: tools/Build-AisrafCopilotPluginBundle.ps1
  bundle_target_created: false
  build_script_created: false
  validators_modified: false
  plugin_installed: false
  smoke_executed: false
  k3b_may_proceed_after_k3a_pass: true
  k3c_blocked_until_k3b_validator_patch_pass: true
  wp12c_l_blocked: true
  wp13_blocked: true

