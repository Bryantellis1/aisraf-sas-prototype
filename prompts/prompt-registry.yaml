schema_version: aisraf_prompt_registry.v0_1_2
registry_id: prompt-registry
title: AISRAF SAS Prompt Registry
package_version: v0.1.2
owning_build_package: "04"
status: active
prompt_count: 23
prompt_family_counts:
  rs: 14
  dfd: 9
prompt_families:
  - rs
  - dfd

purpose: >
  Register the canonical, reusable, parameterized prompt cards for AISRAF SAS
  Prototype v0.1.2. Each prompt card is an operator-facing instruction that
  Copilot or a future adapter/agent can open in VS Code, run against a
  resolved run profile, and use to write structured outputs only under the
  resolved {{output_root}}. Prompt cards are not runtime tools; they declare
  inputs, outputs, stop conditions, unknown handling, and a direct operator
  test. Skill contracts (Build Package 05) and PRA specifications (Build
  Package 06) will later wrap these prompts.

scope:
  canonical_prompt_root: prompts
  prompt_subfolders:
    - prompts/rs
    - prompts/dfd
  prompt_cards_are_runtime_tools: false
  prompt_cards_claim_skill_execution: false
  prompt_cards_claim_pra_execution: false
  prompt_cards_claim_adapter_execution: false
  prompt_cards_claim_external_postback: false
  prompt_cards_claim_scoring_proof: false
  prompt_cards_claim_release_or_diagram_export: false

parameter_contract:
  run_profile_source: runs/{{run_id}}/run-profile.yaml
  required_run_profile_fields:
    - "{{run_id}}"
    - "{{input_root}}"
    - "{{expected_root}}"
    - "{{output_root}}"
    - "{{mode}}"
    - "{{postback_execution_status}}"
    - "{{output_destination_mode}}"
  no_hardcoded_values:
    - run_id
    - sample_id
    - input_root
    - expected_root
    - output_root
    - source_ticket_url
    - destination_ticket_url
    - destination_confluence_url
    - output_destination_mode
    - postback_execution_status
  output_root_rule: every_write_path_must_resolve_under_output_root
  schema_authority: config/run-profile.schema.yaml
  field_catalog: config/run-profile.field-catalog.md
  validation_rules: config/run-profile.validation-rules.md
  path_resolution_rules: config/path-resolution-rules.md
  sensitive_data_rules: config/sensitive-data-rules.md

required_prompt_sections:
  - "1. Identity"
  - "2. Purpose"
  - "3. Run Profile Inputs"
  - "4. Required Read Paths"
  - "5. Required Output"
  - "6. Instructions"
  - "7. Stop Conditions"
  - "8. Unknown Handling"
  - "9. Evidence / Run-Log Guidance"
  - "10. Direct Prompt Test"
  - "11. Not In Scope"

forbidden_claims:
  - skill_execution
  - pra_execution
  - agent_md_adapter_execution
  - jira_postback_execution
  - confluence_publication_execution
  - rovo_execution
  - mcp_execution
  - runtime_or_cloud_execution
  - database_execution
  - terraform_or_adk_execution
  - release_or_zip_export_from_a_prompt
  - diagram_generation_from_a_prompt
  - scoring_proof_outside_13_accuracy_score
  - hardcoded_run_id_paths_or_urls

placeholder_conventions:
  future_skill_id_suffix: "(planned; defined in Build Package 05)"
  future_pra_owner_suffix: "(planned; defined in Build Package 06)"
  notes: >
    The future_skill_id and future_pra_owner values in this registry are
    non-binding placeholders. Build Package 05 will replace each
    future_skill_id with a concrete SK-* contract path. Build Package 06 will
    replace each future_pra_owner with a concrete PRA-* specification path.
    A prompt card may not depend on a Package 05+ artifact as a hard read.

compatibility_notes:
  rs_output_12_targeted_questions:
    decision: retained
    decided_by: founder
    detail: >
      Build Package 04 keeps the v0.01 RS output 12-targeted-questions.md.
      The RS-07 prompt (07-missing-fact-question-generate.prompt.md) writes
      both {{output_root}}/09-missing-facts.md and
      {{output_root}}/12-targeted-questions.md. No separate targeted-question
      prompt is created; the total prompt count remains 23.
  rs_full_chain_wrapper:
    decision: planned_only
    decided_by: founder
    detail: >
      00-run-full-chain.prompt.md has status: planned in Package 04. It
      writes no output of its own. It enumerates the prompt chain order and
      records that orchestration, skill execution, PRA execution, adapter
      execution, scoring, Jira/Confluence/Rovo/MCP/runtime/release execution
      are out of Package 04 scope.
  dfd_prompt_numbering:
    decision: preserved_02_through_10
    decided_by: founder
    detail: >
      The DFD prompt family preserves the v0.01 numbering 02 through 10
      (nine cards, no DFD-01 card). Output files under {{output_root}}/dfd/
      are renumbered 01-intake-quality-check.md through 09-extraction-summary.md.

