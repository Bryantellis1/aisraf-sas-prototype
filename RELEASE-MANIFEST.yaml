# AISRAF Release Manifest
#
# Authoritative public-release metadata for AISRAF v0.1.2.
#
# This manifest is non-executing. It declares the AL2 controlled-output
# release surface, names current and future autonomy levels, fixes the
# AI component pattern wording, lists the validators that must remain
# green, names local-only paths excluded from staging, names forbidden
# claims, and lists known warnings carried into the release.
#
# Promoted by: WP-12C-REL0-B (Public Release Docs).

