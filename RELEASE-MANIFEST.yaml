autonomy_terms_plain_english:
  al: "AL means Autonomy Level: how autonomous the user experience is."
  am: "AM means Autonomy Mode / release evidence lane: how AISRAF proves that autonomy capability."
  mode_0: preview/read-only; no writes.
  mode_1_al2: everyday controlled-output local workbench.
  mode_2_am3_al3: local orchestrated runtime evidence path.
  mode_3: maintainer validation and release QA.
  mode_4_am4: future external adapter/post-back execution.
  al5: closed-loop autonomy; out of scope.

current_autonomy_level: AM3_AL3_LOCAL_ORCHESTRATED_RUNTIME_EVIDENCE
current_autonomy_description: >-
  AISRAF v0.1.2 proves AM3 / AL3 local orchestrated multi-agent runtime
  evidence. AM3 evidence is local-only, human-gated, validator-backed,
  and evidence-bound. AISRAF Orchestrator owns run-state and event log.
  Specialist handoffs are represented by AM3-01 through AM3-06
  request/response pairs. Human gates remain required.
current_autonomy_limiter: >-
  This is an evidence-path claim, not a claim of full
  specialist-generated review output execution, production readiness,
  publication, or AM4 integration.
current_autonomy_proof: runs/RUN-SMOKE-AM3-001/runtime/
controlled_output_proof: runs/RUN-SMOKE-PLUGIN-L2B-001
future_autonomy_level: AM4_EXTERNAL_ADAPTERS
future_autonomy_description: >-
  AM4 external adapter / post-back execution is future adapter work.
  AL5 closed-loop autonomy is out of scope.
external_execution_status: not_claimed

release_journey_modes:
  mode_0:
    name: read_preview_no_writes
    display_label: Mode 0 - read/preview, no writes
    release_state: current_preview_path
    description: >-
      Read-only inspection of roles, inputs, run profiles, expected outputs,
      manifests, and evidence. No writes are performed.
  mode_1:
    name: AL2_controlled_output_workbench
    display_label: Mode 1 - AL2 controlled-output workbench
    release_state: current_everyday_practitioner_ux
    description: >-
      Normal security architect and application architect workflow. Outputs are
      governed local Markdown files under approved run folders.
  mode_2:
    name: AM3_AL3_local_orchestrated_runtime_evidence
    display_label: Mode 2 - AM3 / AL3 local orchestrated runtime evidence
    release_state: current_release_visible_local_runtime_journey_and_proof_path
    description: >-
      AISRAF Orchestrator owns run-state and event log. AM3-01 through AM3-06
      specialist handoffs and human gates are represented in local-only runtime
      evidence. This is not full specialist-generated review output execution
      and not AM4 external adapter execution.
  mode_3:
    name: maintainer_validation_and_release_QA
    display_label: Mode 3 - maintainer validation and release QA
    release_state: current_maintainer_path
    description: >-
      Validators, bundle checksum validation, manifests, blocker registers,
      closeout reports, and release QA. This path does not generate practitioner
      review outputs.
  mode_4:
    name: AM4_external_adapter_post_back_execution
    display_label: Mode 4 - AM4 external adapter / post-back execution
    release_state: future_only_not_implemented
    description: >-
      Jira, Confluence, Lucidchart, MCP, cloud, database, Terraform, event bus,
      telemetry, and external post-back execution are deferred adapter work.
  al5_boundary: out_of_scope_for_v0_1_2_and_v0_1_x

ai_component_pattern_current: AI_for_outside_component
ai_component_pattern_near_term: AI_beside_on_component
ai_component_pattern_not_current: AI_inside_component

