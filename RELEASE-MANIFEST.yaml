current_autonomy_level: AL2
current_autonomy_description: >-
  Controlled-output local workbench: operator selects an AISRAF role,
  role writes governed outputs only inside an approved scratch run
  folder, hooks enforce path guards and run validators.
current_autonomy_proof: runs/RUN-SMOKE-PLUGIN-L2B-001
future_autonomy_level: AL3_ORCH
future_autonomy_description: >-
  AL3 orchestrated multi-agent runtime is future WP-ORCH; AL4 external
  adapter / post-back execution is future adapter work; AL5 closed-loop
  autonomy is out of scope.
external_execution_status: not_claimed

ai_component_pattern_current: AI_for_outside_component
ai_component_pattern_near_term: AI_beside_on_component
ai_component_pattern_not_current: AI_inside_component

