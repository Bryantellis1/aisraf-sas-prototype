local_only_paths:
  - .claude/
  - runs/RUN-SMOKE-LOCAL-001/
  - runs/RUN-SMOKE-PLUGIN-L2B-001/
  - runs/RUN-SMOKE-AM3-001/
local_only_policy: >-
  These paths are local-only smoke or environment evidence. They are not
  part of the v0.1.2 public release surface and must not be committed or
  published. .claude/, runs/RUN-SMOKE-LOCAL-001/,
  runs/RUN-SMOKE-PLUGIN-L2B-001/, and runs/RUN-SMOKE-AM3-001/ are
  excluded from git staging via local ignore rules; the smoke folders are
  ignored, untracked, unstaged, and not publication artifacts.

