  architecture_overview: docs/ARCHITECTURE-OVERVIEW.md
  roadmap: docs/ROADMAP.md

current_autonomy_level: AM3_AL3_LOCAL_ORCHESTRATED_RUNTIME_EVIDENCE
current_autonomy_description: >-
  AISRAF v0.1.2 proves AM3 / AL3 local orchestrated multi-agent runtime
  evidence. AM3 evidence is local-only, human-gated, validator-backed,
  and evidence-bound. AISRAF Orchestrator owns run-state and event log.
  Specialist handoffs are represented by AM3-01 through AM3-06
  request/response pairs. Human gates remain required.
current_autonomy_limiter: >-
  This is an evidence-path claim, not a claim of full
  specialist-generated review output execution, production readiness,
  publication, or AM4 integration.
current_autonomy_proof: runs/RUN-SMOKE-AM3-001/runtime/
controlled_output_proof: runs/RUN-SMOKE-PLUGIN-L2B-001
future_autonomy_level: AM4_EXTERNAL_ADAPTERS
future_autonomy_description: >-
  AM4 external adapter / post-back execution is future adapter work.
  AL5 closed-loop autonomy is out of scope.
external_execution_status: not_claimed

ai_component_pattern_current: AI_for_outside_component
ai_component_pattern_near_term: AI_beside_on_component
ai_component_pattern_not_current: AI_inside_component

