# AISRAF Release Manifest
#
# Authoritative public-release metadata for AISRAF v0.1.2.
#
# Plain-language autonomy terms: AL means Autonomy Level (how autonomous
# the user experience is). AM means Autonomy Mode / release evidence lane
# (how AISRAF proves that autonomy capability). Mode 0 is preview/read-only,
# Mode 1 / AL2 is the controlled-output local workbench, Mode 2 / AM3 / AL3
# is the local orchestrated runtime evidence path, Mode 3 is maintainer
# validation and release QA, Mode 4 / AM4 is future external adapter/post-back
# execution, and AL5 closed-loop autonomy is out of scope.
#
# This manifest is non-executing. It declares the bounded AM3 / AL3
# local orchestrated runtime evidence claim, names current and future autonomy levels, fixes the
# AI component pattern wording, lists the validators that must remain
# green, names local-only paths excluded from staging, names forbidden
# claims, and lists known warnings carried into the release.
#
# Promoted by: WP-12C-REL0-B (Public Release Docs).

