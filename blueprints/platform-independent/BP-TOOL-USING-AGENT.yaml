human_review_gate:
  required: true
  notes: >
    Tool authorization scope and HITL placement are review-level decisions
    confirmed by skills/rs/SK-AI-ACTION-LEVEL-CLASSIFY,
    skills/rs/SK-FINDING-CLASSIFY, and human review.

prohibited_claims:
