blueprint_id: BP-TOOL-USING-AGENT
blueprint_name: Tool-Using Agent
owning_build_package: Build Package 08
status: active

purpose: >
  Recognize patterns in which an AI agent invokes external tools or
  internal APIs (search, code execution, database query, file read,
  calendar/email operations) as part of its decision loop. The agent
  selects and calls tools based on model reasoning, not pre-programmed
  branching. Tool scope and write authorization are the primary review
  concerns.

applicability:
  category: platform-independent
  ai_action_levels:
    - AAL-L2
    - AAL-L3
    - AAL-L4
    - AAL-UNKNOWN
  primary_interaction_types:
    - IT-TOOL-CALL
    - IT-MODEL-CALL
    - IT-DATA-FLOW
  primary_concerns:
    - Are tools read-only, scoped, or write-capable?
    - Is the tool selection model-driven or pre-programmed?
    - Is a HITL gate required for tool write-back at AAL-L3+?
    - Are any tool calls internet-crossing?
  not_applicable_when: |
    No IT-TOOL-CALL is supported in the chain (consider
    BP-MODEL-ENDPOINT-CALL or BP-RAG-RETRIEVAL). The agent delegates to
    other agents (add BP-AGENT-TO-AGENT as a secondary candidate). Tool
    write-back to production is autonomous (BP-API-WRITEBACK is a
    secondary candidate). Multi-step composition (BP-AI-WORKFLOW may be
    primary).

catalog_dependencies:
  - catalog_id: interaction-type-catalog
    family_id: interactions
    path: catalogs/interactions/interaction-type-catalog.yaml
    use: confirm IT-TOOL-CALL plus IT-MODEL-CALL
  - catalog_id: flow-direction-catalog
    family_id: interactions
    path: catalogs/interactions/flow-direction-catalog.yaml
    use: classify tool-call and model-call flow directions
  - catalog_id: flow-evidence-rule-catalog
    family_id: interactions
    path: catalogs/interactions/flow-evidence-rule-catalog.yaml
    use: enforce per-flow evidence rules
  - catalog_id: boundary-type-catalog
    family_id: boundaries
    path: catalogs/boundaries/boundary-type-catalog.yaml
    use: identify tool-surface, model-endpoint, and store boundaries
  - catalog_id: boundary-crossing-rule-catalog
    family_id: boundaries
    path: catalogs/boundaries/boundary-crossing-rule-catalog.yaml
    use: detect internet-crossing tool calls
  - catalog_id: trust-zone-catalog
    family_id: boundaries
    path: catalogs/boundaries/trust-zone-catalog.yaml
    use: classify source and destination trust zones
  - catalog_id: authentication-catalog
    family_id: identity-access
    path: catalogs/identity-access/authentication-catalog.yaml
    use: identify auth markers at tool surfaces and the model endpoint
  - catalog_id: authorization-catalog
    family_id: identity-access
    path: catalogs/identity-access/authorization-catalog.yaml
    use: identify authorization values for tool scope (read-only / scoped / unrestricted)
  - catalog_id: identity-evidence-rule-catalog
    family_id: identity-access
    path: catalogs/identity-access/identity-evidence-rule-catalog.yaml
    use: enforce identity evidence rules including least privilege and approval authority
  - catalog_id: data-class-catalog
    family_id: data-protection
    path: catalogs/data-protection/data-class-catalog.yaml
    use: identify data class for tool-read and tool-write flows
  - catalog_id: transport-protection-catalog
    family_id: data-protection
    path: catalogs/data-protection/transport-protection-catalog.yaml
    use: identify transit encryption on internet-crossing tool calls
  - catalog_id: confidence-level-catalog
    family_id: data-protection
    path: catalogs/data-protection/confidence-level-catalog.yaml
    use: cross-cutting confidence levels for blueprint match disposition
  - catalog_id: ai-action-level-catalog
    family_id: review
    path: catalogs/review/ai-action-level-catalog.yaml
    use: scope of AI Action Levels supported by this pattern
  - catalog_id: finding-category-catalog
    family_id: review
    path: catalogs/review/finding-category-catalog.yaml
    use: scope of supported finding categories
  - catalog_id: recommendation-type-catalog
    family_id: review
    path: catalogs/review/recommendation-type-catalog.yaml
    use: scope of supported recommendation types
  - catalog_id: proof-vs-signal-rule-catalog
    family_id: security-stacks
    path: catalogs/security-stacks/proof-vs-signal-rule-catalog.yaml
    use: global signal-vs-proof rule referenced by every blueprint claim

required_inputs:
  - input_id: review_table_chain
    description: chain of flow rows with interaction types resolved
    source: skills/rs/SK-DATA-FLOW-TABLE-BUILD.md output
  - input_id: ai_action_level_classification
    description: AI Action Level result for the highest-action-level step
    source: skills/rs/SK-AI-ACTION-LEVEL-CLASSIFY.md output
  - input_id: boundary_crossing_records
    description: boundary-crossing detection results for tool surfaces and model endpoint
    source: skills/rs/SK-BOUNDARY-CROSSING-DETECT.md output
  - input_id: confidence_levels
    description: per-row confidence values
    source: catalogs/data-protection/confidence-level-catalog.yaml

match_conditions:
  - condition_id: BP-TOOL-USING-AGENT-MATCH-01
    description: Both IT-TOOL-CALL and IT-MODEL-CALL are supported in the chain, with the model invocation feeding tool selection (agent loop pattern).
    catalog_evidence:
      - catalog_id: interaction-type-catalog
        required_values: [IT-TOOL-CALL, IT-MODEL-CALL]

candidate_conditions:
  - condition_id: BP-TOOL-USING-AGENT-CANDIDATE-01
    description: IT-TOOL-CALL is supported but model-driven tool selection is unclear; or IT-MODEL-CALL is supported with a possible IT-TOOL-CALL marked unknown.
    catalog_evidence:
      - catalog_id: interaction-type-catalog
        partial_support_values: [IT-TOOL-CALL, IT-MODEL-CALL, IT-UNKNOWN]
      - catalog_id: confidence-level-catalog
        partial_support_values: [medium, low]

no_match_conditions:
  - condition_id: BP-TOOL-USING-AGENT-NO-MATCH-01
    description: No IT-TOOL-CALL is supported in the chain.
    catalog_evidence:
      - catalog_id: interaction-type-catalog
        absent_or_conflicting_values: [IT-TOOL-CALL]
  - condition_id: BP-TOOL-USING-AGENT-NO-MATCH-02
    description: IT-TOOL-CALL is supported but no IT-MODEL-CALL drives tool selection (deterministic flow, not an agent loop).
    catalog_evidence:
      - catalog_id: interaction-type-catalog
        absent_or_conflicting_values: [IT-MODEL-CALL]

unknown_conditions:
  - condition_id: BP-TOOL-USING-AGENT-UNKNOWN-01
    description: Interaction types are unresolved or the agent autonomy level is undetermined.
    catalog_evidence:
      - catalog_id: interaction-type-catalog
        unknown_when_value: IT-UNKNOWN
      - catalog_id: confidence-level-catalog
        unknown_when_value: unknown

material_missing_facts:
  - fact_id: BP-TOOL-USING-AGENT-MMF-01
    description: Which tools have write capability and what is the authorization scope?
    catalog_reference: authorization-catalog
    affects:
      - ai_action_level
      - finding_category
    targeted_question_owner: skills/rs/SK-TARGETED-QUESTION-GENERATE.md
  - fact_id: BP-TOOL-USING-AGENT-MMF-02
    description: Is tool selection model-driven (agent loop) or pre-programmed (deterministic)?
    catalog_reference: interaction-type-catalog
    affects:
      - blueprint_match
      - ai_action_level
    targeted_question_owner: skills/rs/SK-TARGETED-QUESTION-GENERATE.md
  - fact_id: BP-TOOL-USING-AGENT-MMF-03
    description: Can any tool send a message, write to a store, or trigger an external action?
    catalog_reference: interaction-type-catalog
    affects:
      - ai_action_level
      - finding_category
    targeted_question_owner: skills/rs/SK-TARGETED-QUESTION-GENERATE.md
  - fact_id: BP-TOOL-USING-AGENT-MMF-04
    description: Is a HITL gate present before tool write-back when AAL is L3+?
    catalog_reference: interaction-type-catalog
    affects:
      - ai_action_level
      - finding_category
    targeted_question_owner: skills/rs/SK-TARGETED-QUESTION-GENERATE.md

supported_finding_categories:
  - finding_category_id: FC-GAP
    catalog: catalogs/review/finding-category-catalog.yaml
  - finding_category_id: FC-DEFICIENCY
