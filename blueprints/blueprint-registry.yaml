# Founder decision Q8 / future-only ADK alignment block. Future intent
# only; no runtime, ADK, cloud, MCP, Jira, Confluence, Rovo, database,
# or Terraform code or proof exists in this package.
planned_future_adk_alignment:
  status: future_only
  runtime_deployed: false
  adk_deployed: false
  cloud_resources_created: false
  database_jobs_created: false
  mcp_execution_available: false
  jira_confluence_execution_available: false

# Compatibility notes.
compatibility_notes:
  upstream_blueprint_match_skill_placeholder:
    issue: |
      The Build Package 05 skill registry records SK-REVIEW-BLUEPRINT-MATCH
      with a minimal placeholder catalog list (trust-zone-catalog plus
      confidence-level-catalog) and a note that "Blueprint match is
      deferred to Build Package 08; this catalog consumption is read-only
      context only." The Build Package 07 catalog registry records the
      same minimal placeholder for PR-RS-09-BLUEPRINT-MATCH.
    package_08_action: |
      Per founder decision Q4, Build Package 08 must not edit either
      upstream registry. The full per-blueprint catalog consumption is
      recorded in this blueprint-registry.yaml#blueprint_catalog_map and
      cross-checked in validation/blueprint-catalog-consumption-checklist.md.
    recommended_future_fix: |
      A future governed skill-registry update may align the
      SK-REVIEW-BLUEPRINT-MATCH catalog list with the union of all
      blueprint_catalog_map entries; until then, the blueprint registry
      is the authoritative consumer map for Package 08.
  pra_06_catalog_alignment:
    issue: |
      PRA-06-BLUEPRINT-QUESTIONER's existing catalog dependency list in
      catalogs/catalog-registry.yaml#pra_consumption_map covers eight
      catalogs (interaction-type, trust-zone, authentication, authorization,
      identity-evidence-rule, ai-action-level, confidence-level,
      proof-vs-signal-rule). Several Package 08 blueprints (notably
      BP-API-WRITEBACK, BP-AI-WORKFLOW, BP-AI-SAAS-INTEGRATION) span a
      wider catalog set including data-protection and security-stack
      catalogs.
    package_08_action: |
      Per founder decision Q4, Build Package 08 must not edit the catalog
      registry. The wider per-blueprint catalog consumption is recorded
      here in blueprint_catalog_map. PRA-06 fetches blueprint files at
      runtime; its existing catalog list remains the canonical PRA-level
      record.
    recommended_future_fix: |
      A future governed update may expand PRA-06's catalog list to mirror
      the union of blueprint catalog dependencies. Until then, the two
      lists are reconciled here in compatibility_notes.

