registry_id: aisraf-blueprint-registry
schema_version: aisraf_blueprint_registry.v0_1_2
package_version: v0.1.2
owning_build_package: Build Package 08
status: active

# Headline counts (founder decision Q6).
blueprint_count: 9
blueprint_category_count: 2
total_files_under_blueprints: 14

# Match-state model (founder decision Q1).
blueprint_match_states:
  - matched
  - candidate
  - no_match
  - unknown

unknown_value: unknown

# Global prohibited claims for every blueprint and the registry.
prohibited_claims:
  - runtime_or_cloud_execution
  - mcp_jira_confluence_rovo_execution
  - adk_or_vertex_or_gcp_execution
  - database_or_terraform_execution
  - implementation_proof_from_blueprint_match
  - severity_computed_inside_blueprint
  - ai_action_level_computed_inside_blueprint
  - score_computed_inside_blueprint
  - finding_prose_inside_blueprint
  - recommendation_prose_inside_blueprint
  - handoff_prose_inside_blueprint
  - validation_ticket_prose_inside_blueprint
  - owner_routing_inside_blueprint
  - new_catalog_value_introduced_inside_blueprint
  - approved_security_stack_from_blueprint_match

# Founder decision Q8 — explicit runtime and external execution flags.
runtime_and_external_execution:
  runtime_deployed: false
  adk_deployed: false
  cloud_resources_created: false
  database_jobs_created: false
  mcp_execution_available: false
  jira_confluence_execution_available: false

# Founder decision Q4 — sealed upstream registries. Build Package 08
# records its consumer mappings in this file and in the validation
# checklists only; it does not modify any of the four upstream
# registries.
sealed_upstream_registries:
  - prompts/prompt-registry.yaml
  - skills/skill-registry.yaml
  - prototype-agents/prototype-agent-registry.yaml
  - catalogs/catalog-registry.yaml
sealed_upstream_policy: >
  Build Package 08 must not modify any of the upstream registries above.
  All blueprint-level consumer mapping is recorded in this
  blueprint-registry.yaml, in validation/blueprint-registry-checklist.md,
  and in validation/blueprint-catalog-consumption-checklist.md.

# Human review gate policy (every blueprint asserts human_review_required: true).
human_review_gate_policy:
  every_blueprint_match_is_a_review_hypothesis: true
  selection_of_match_state_requires_human_review: true
  ai_action_level_selection_remains_with_skills_and_human_review: true
  finding_severity_selection_remains_with_skills_and_human_review: true
  final_disposition_remains_with_skills_and_human_review: true

# Founder decision Q7 — two-category model.
blueprint_categories:
  - category_id: platform-independent
    path: blueprints/platform-independent/
    description: Blueprints whose match conditions do not materially depend on a specific cloud provider, vendor SaaS, or third-party platform.
    blueprint_count: 8
  - category_id: cloud-patterns
    path: blueprints/cloud-patterns/
    description: Blueprints whose match conditions materially depend on a cloud or third-party SaaS boundary crossing.
    blueprint_count: 1

# Authoritative inventory.
blueprints:
  - blueprint_id: BP-NON-AI-DATAFLOW-BASELINE
    blueprint_name: Non-AI Dataflow Baseline
    category: platform-independent
    path: blueprints/platform-independent/BP-NON-AI-DATAFLOW-BASELINE.yaml
    status: active
    purpose_summary: Recognize service-to-service / service-to-store flows with no AI invocation; confirm AAL-L0.
    primary_interaction_types: [IT-DATA-FLOW, IT-OBSERVABILITY, IT-CONTROL-PLANE-ACTION]

  - blueprint_id: BP-RAG-RETRIEVAL
    blueprint_name: RAG Retrieval
    category: platform-independent
    path: blueprints/platform-independent/BP-RAG-RETRIEVAL.yaml
    status: active
    purpose_summary: Recognize retrieval-augmented generation (vector/search retrieval feeding a model endpoint).
    primary_interaction_types: [IT-MODEL-CALL, IT-DATA-FLOW]

  - blueprint_id: BP-MODEL-ENDPOINT-CALL
    blueprint_name: Model Endpoint Call
    category: platform-independent
    path: blueprints/platform-independent/BP-MODEL-ENDPOINT-CALL.yaml
    status: active
    purpose_summary: Recognize direct invocation of an internally hosted or managed-cloud model endpoint.
    primary_interaction_types: [IT-MODEL-CALL, IT-DATA-FLOW]

  - blueprint_id: BP-TOOL-USING-AGENT
    blueprint_name: Tool-Using Agent
    category: platform-independent
    path: blueprints/platform-independent/BP-TOOL-USING-AGENT.yaml
    status: active
    purpose_summary: Recognize an AI agent invoking tools or APIs as part of a model-driven decision loop.
    primary_interaction_types: [IT-TOOL-CALL, IT-MODEL-CALL, IT-DATA-FLOW]

  - blueprint_id: BP-API-WRITEBACK
    blueprint_name: API Write-Back
    category: platform-independent
    path: blueprints/platform-independent/BP-API-WRITEBACK.yaml
    status: active
    purpose_summary: Recognize AI/agent output written back to a data store or downstream service via an API call.
    primary_interaction_types: [IT-WRITE-BACK, IT-MODEL-CALL, IT-HITL-APPROVAL]

  - blueprint_id: BP-HITL-APPROVAL
    blueprint_name: HITL Approval
    category: platform-independent
    path: blueprints/platform-independent/BP-HITL-APPROVAL.yaml
    status: active
    purpose_summary: Recognize a discrete human-in-the-loop approval gate before any post-AI action.
    primary_interaction_types: [IT-HITL-APPROVAL, IT-MODEL-CALL]

  - blueprint_id: BP-AGENT-TO-AGENT
    blueprint_name: Agent-to-Agent
    category: platform-independent
    path: blueprints/platform-independent/BP-AGENT-TO-AGENT.yaml
    status: active
    purpose_summary: Recognize orchestrator-to-executor or peer-agent delegation between AI agents.
    primary_interaction_types: [IT-AGENT-TO-AGENT, IT-MODEL-CALL]

  - blueprint_id: BP-AI-WORKFLOW
    blueprint_name: AI Workflow
    category: platform-independent
    path: blueprints/platform-independent/BP-AI-WORKFLOW.yaml
    status: active
    purpose_summary: Recognize multi-step composition of two or more AI sub-patterns in a coordinated chain.
    primary_interaction_types: [IT-MODEL-CALL, IT-TOOL-CALL, IT-WRITE-BACK, IT-HITL-APPROVAL, IT-AGENT-TO-AGENT, IT-DATA-FLOW]

  - blueprint_id: BP-AI-SAAS-INTEGRATION
    blueprint_name: AI SaaS Integration
    category: cloud-patterns
    path: blueprints/cloud-patterns/BP-AI-SAAS-INTEGRATION.yaml
    status: active
    purpose_summary: Recognize internet-crossing model invocation to an external AI SaaS provider.
    primary_interaction_types: [IT-MODEL-CALL, IT-DATA-FLOW]

