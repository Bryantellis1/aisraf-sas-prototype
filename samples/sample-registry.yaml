      AI SaaS Security Review Portal — internal security-review web application
      that accepts authenticated review requests, stores review metadata in an
      internal database, calls an external AI Analysis Service for analysis
      assistance, retrieves policy/reference context, captures reviewer
      findings, and renders local Jira/Confluence drafts (formatted_only).
