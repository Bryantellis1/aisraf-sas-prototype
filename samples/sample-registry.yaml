compatibility_notes:
  upstream_registries_sealed_for_build_package_10:
    - prompts/prompt-registry.yaml
    - skills/skill-registry.yaml
    - prototype-agents/prototype-agent-registry.yaml
    - catalogs/catalog-registry.yaml
    - blueprints/blueprint-registry.yaml
    - templates/template-registry.yaml
  c4p_under_dc_c5p_raw_pattern: >
    The sample-001 token `C4P` resolves under the data-class-catalog raw_pattern
    `^C[1-5]P$` recorded in `catalogs/data-protection/data-class-catalog.yaml#DC-C5P`.
    This is documented in `samples/sample-001-dfd-crop/expected/expected-03-legend-normalization.md`
    with a CL-MEDIUM confidence note. No new catalog entry is introduced.
