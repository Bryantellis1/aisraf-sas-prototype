registry_id: aisraf-sample-registry
schema_version: aisraf_sample_registry.v0_1_2
package_version: v0.1.2
title: AISRAF SAS Sample Registry
owning_build_package: Build Package 10
status: active

# Headline counts (founder decision Q8 — Build Package 10).
sample_count_active: 1
sample_count_deferred: 7
sample_class_counts:
  gold_standard_scored: 1
  targeted_behavior_baseline: 0
  exploratory: 0
total_files_under_samples: 36   # 1 registry + 1 root README + 1 sample README + 6 inputs + 26 expected + 1 sample-001 implicit folder count is excluded; physical files only

unknown_value: unknown

purpose: >
  Pin the AISRAF SAS sample inventory for v0.1.2. Samples are test fixtures
  that exercise the Build Package 04-09 chain end-to-end against synthetic
  inputs and Markdown expected baselines. They are not live runs, runtime
  evidence, release artefacts, diagrams package assets, or external Jira /
  Confluence / MCP proof. Package 10 builds sample-001 only; sample-002
  through sample-008 are recorded as planned/deferred entries here without
  folders or files (founder decision Q8).

scope:
  canonical_sample_root: samples
  sample_subfolders_present:
    - samples/sample-001-dfd-crop
  samples_are_runtime_tools: false
  samples_compute_severity_or_score_or_action_level_or_match: false
  samples_invent_findings_or_recommendations: false
  samples_claim_external_postback: false
  samples_claim_runtime_or_cloud_execution: false

# Allowed run-profile variable set (the 7 approved placeholders only).
parameter_contract:
  run_profile_source: runs/{{run_id}}/run-profile.yaml
  required_run_profile_fields:
    - "{{run_id}}"
    - "{{input_root}}"
    - "{{expected_root}}"
    - "{{output_root}}"
    - "{{mode}}"
    - "{{postback_execution_status}}"
    - "{{output_destination_mode}}"
  rejected_non_schema_variables:
    - "{{catalog_root}}"
    - "{{prompt_root}}"
    - "{{skill_root}}"
    - "{{template_root}}"
    - "{{diagram_root}}"
    - "{{validation_root}}"
  expected_root_rule: every_sample_baseline_path_must_resolve_under_samples_<sample_id>_expected
  schema_authority: config/run-profile.schema.yaml

# Required metadata block in every sample registry entry.
required_sample_entry_fields:
  - sample_id
  - sample_class
  - status
  - scenario_summary
  - inputs
  - expected_baselines
  - consumers
  - mirrors_templates
  - blueprint_dispositions_expected
  - ai_action_level_expected
  - critical_miss_categories
  - prohibited_claims
  - runtime_and_external_execution
  - source_reference
  - version_notes

# Global prohibited claims (mirrors Package 07/08/09 shape).
prohibited_claims:
  - runtime_or_cloud_execution
  - mcp_jira_confluence_rovo_execution
  - adk_or_vertex_or_gcp_execution
  - database_or_terraform_execution
  - severity_computed_inside_sample
  - score_computed_inside_sample
  - ai_action_level_computed_inside_sample
  - blueprint_match_decided_inside_sample
  - finding_facts_invented_inside_sample
  - recommendation_prose_invented_inside_sample
  - external_postback_claimed_inside_sample
  - new_catalog_value_introduced_inside_sample
  - new_blueprint_id_introduced_inside_sample
  - implementation_proof_claimed_inside_sample
  - real_pii_pan_ssn_phi_in_sample
  - real_secrets_or_credentials_in_sample
  - real_production_endpoints_in_sample

# Founder Q-block — six explicit runtime/external execution flags.
runtime_and_external_execution:
  runtime_deployed: false
  adk_deployed: false
  cloud_resources_created: false
  database_jobs_created: false
  mcp_execution_available: false
  jira_confluence_execution_available: false

# Founder decisions for Build Package 10 (echoes the implementation-scope
# instructions from BUILD-AG-10-SAMPLES-R1).
founder_decisions:
  q1_expected_baseline_shape: markdown_only_with_optional_yaml_front_matter_for_scoring_metadata
  q2_run_log_expected: do_not_create_expected_00_run_log_md_run_logs_belong_to_build_package_11
  q3_dfd_subskill_expected_baselines: included_9_dfd_baselines_in_sample_001
  q4_dfd_png_regeneration: regenerated_from_v0_1_2_mermaid_source_via_mmdc_not_bit_copied_from_v0_01
  q5_expected_score: legacy_reference_151_160_recorded_only_v0_1_2_verdict_PASS_READY_FOR_REVIEW
  q6_test_aisraf_package_patch: surgical_four_change_patch_approved
  q7_sample_registry: required_active_sample_001_plus_planned_deferred_002_through_008
  q8_sample_family_scope: build_only_sample_001_now_deferred_002_through_008_recorded_only_in_registry

